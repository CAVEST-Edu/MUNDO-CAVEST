<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Registro - CAVEST</title>
<style>
    body{ font-family:Arial; background:#0f172a; color:white; display:flex; justify-content:center; align-items:center; height:100vh; margin: 0; }
    .container{ background:#1e293b; padding:40px; border-radius:10px; width:350px; text-align:center; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
    input, select{ width:100%; padding:10px; margin:10px 0; border:none; border-radius:5px; background: white; color: #334155; box-sizing: border-box; }
    label { display: block; text-align: left; font-size: 14px; color: #94a3b8; margin-top: 5px; }
    button{ padding:12px; width:100%; background:#38bdf8; border:none; border-radius:5px; cursor:pointer; font-weight: bold; color: #020617; margin-top: 10px; }
    button:hover { background: #0ea5e9; }
</style>
</head>
<body>

<div class="container">
    <h2>Registrar</h2>
    <input type="text" id="nome" placeholder="Nome completo">
    <input type="email" id="email" placeholder="Seu melhor E-mail">
    <input type="password" id="senha" placeholder="Crie uma senha (mín. 6 dígitos)">

    <label for="cargo">Eu sou:</label>
    <select id="cargo">
      <option value="aluno">Aluno(a)</option>
      <option value="professor">Professor(a)</option>
    </select>

    <button id="btnRegistrar">Criar Conta</button>
    <p style="margin-top: 15px; font-size: 13px; color: #94a3b8;">Já tem conta? <a href="login.html" style="color: #38bdf8; text-decoration: none;">Faça login</a></p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCqMEbG7Uf03vNmEcIQa3uZhjV2npiw0_w",
        authDomain: "mundo-cavest.firebaseapp.com",
        projectId: "mundo-cavest",
        storageBucket: "mundo-cavest.appspot.com",
        messagingSenderId: "386396770156",
        appId: "1:386396770156:web:2c506fdb989e4c15e6ad49"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    document.getElementById("btnRegistrar").onclick = async () => {
        const nome = document.getElementById("nome").value.trim();
        const email = document.getElementById("email").value.trim();
        const senha = document.getElementById("senha").value.trim();
        const cargo = document.getElementById("cargo").value;

        if(!nome || !email || !senha) { alert("Preencha tudo, Biu!"); return; }

        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, senha);
            const user = userCredential.user;

            // Salva o nome no perfil do Auth
            await updateProfile(user, { displayName: nome });

            // Cria o documento do usuário no Firestore (onde guardaremos o XP e o Cargo)
            await setDoc(doc(db, "usuarios", user.uid), {
                nome: nome,
                email: email,
                cargo: cargo,
                xp: 0,
                respondidas: 0,
                acertos: 0
            });

            alert("Conta criada com sucesso!");
            window.location.href = "login.html";
        } catch (error) {
            alert("Erro ao registrar: " + error.message);
        }
    };
</script>
</body>
</html>
