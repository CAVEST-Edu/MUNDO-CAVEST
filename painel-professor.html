<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Professor - Mundo CAVEST</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --success: #22c55e;
            --error: #ef4444;
            --text-gray: #94a3b8;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: var(--bg-dark);
            color: white;
            padding: 20px;
            margin: 0;
        }

        .header-admin {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 800px;
            margin: 0 auto 20px;
            background: var(--card-bg);
            padding: 15px 25px;
            border-radius: 12px;
        }

        .btn-logout {
            background: var(--error);
            color: white;
            padding: 8px 15px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
        }

        .form-card {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            max-width: 800px;
            margin: 0 auto 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2, h3 { color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }

        .sessao {
            margin-bottom: 25px;
            padding: 20px;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 10px;
            border: 1px solid #334155;
        }

        label { display: block; margin-top: 15px; color: var(--text-gray); font-size: 11px; font-weight: bold; }

        input, textarea, select {
            width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px;
            border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box;
        }

        .grid-opcoes { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .btn-enviar {
            width: 100%; padding: 15px; background: var(--success); color: white;
            font-weight: bold; border: none; cursor: pointer; border-radius: 8px;
            margin-top: 20px; font-size: 16px; transition: 0.3s;
        }

        .btn-enviar:hover { background: #16a34a; transform: translateY(-2px); }

        .tabela-gerenciamento {
            width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px;
        }

        .tabela-gerenciamento th, .tabela-gerenciamento td {
            text-align: left; padding: 12px; border-bottom: 1px solid #334155;
        }

        .btn-del {
            background: var(--error); color: white; border: none; padding: 5px 10px;
            border-radius: 4px; cursor: pointer; font-size: 12px;
        }

        .voltar { display: block; text-align: center; margin-top: 30px; color: var(--text-gray); text-decoration: none; }
    </style>
</head>
<body>

<div class="header-admin">
    <strong id="boasVindas">Acessando...</strong>
    <a href="#" class="btn-logout" onclick="fazerLogout()">Sair da Conta</a>
</div>

<div class="form-card">
    <h2>🚀 Portal do Mestre - Mundo CAVEST</h2>

    <div class="sessao">
        <h3>📚 Publicar Apostila/PDF</h3>
        <div class="grid-opcoes">
            <div>
                <label>Título do Material:</label>
                <input type="text" id="mat_nome" placeholder="Ex: Resumo de Genética">
            </div>
            <div>
                <label>Disciplina:</label>
                <select id="mat_materia">
                    <option value="fisica">Física</option>
                    <option value="matematica">Matemática</option>
                    <option value="historia">História</option>
                    <option value="geografia">Geografia</option>
                    <option value="biologia">Biologia</option>
                    <option value="quimica">Química</option>
                    <option value="portugues">Português</option>
                </select>
            </div>
        </div>
        <label>Link do Arquivo (Google Drive/URL):</label>
        <input type="text" id="mat_link" placeholder="Cole o link aqui...">
        <button class="btn-enviar" onclick="salvarNovoMaterial()" style="background: var(--accent); color: #000;">Publicar Apostila</button>
    </div>

    <div class="sessao">
        <h3>📝 Criar Nova Questão</h3>
        <div class="grid-opcoes">
            <div>
                <label>Disciplina:</label>
                <select id="q_materia" onchange="atualizarAssuntos()">
                    <option value="">-- Selecione --</option>
                    <option value="fisica">Física</option>
                    <option value="matematica">Matemática</option>
                    <option value="historia">História</option>
                    <option value="geografia">Geografia</option>
                    <option value="biologia">Biologia</option>
                    <option value="quimica">Química</option>
                    <option value="portugues">Português</option>
                </select>
            </div>
            <div>
                <label>Assunto:</label>
                <select id="q_assunto">
                    <option value="">-- Selecione a matéria --</option>
                </select>
            </div>
        </div>

        <label>Link da Imagem <span style="font-weight: normal; color: var(--text-gray);">(Opcional)</span>:</label>
        <input type="text" id="q_imagem" placeholder="https://exemplo.com/imagem.jpg">

        <label>Texto de Apoio / Citação <span style="font-weight: normal; color: var(--text-gray);">(Opcional)</span>:</label>
        <textarea id="q_texto_apoio" rows="3" placeholder="Insira o texto base ou contexto da questão..."></textarea>

        <label>Enunciado da Questão:</label>
        <textarea id="q_pergunta" rows="4" placeholder="Digite o comando da questão aqui..."></textarea>
        
        <div class="grid-opcoes">
            <div><label>Opção A:</label><input type="text" id="q_a"></div>
            <div><label>Opção B:</label><input type="text" id="q_b"></div>
            <div><label>Opção C:</label><input type="text" id="q_c"></div>
            <div><label>Opção D:</label><input type="text" id="q_d"></div>
        </div>

        <div class="grid-opcoes">
            <div>
                <label>Gabarito Correto:</label>
                <select id="q_correta">
                    <option value="a">Alternativa A</option>
                    <option value="b">Alternativa B</option>
                    <option value="c">Alternativa C</option>
                    <option value="d">Alternativa D</option>
                </select>
            </div>
            <div>
                <label>Explicação/Resolução <span style="font-weight: normal; color: var(--text-gray);">(Opcional)</span>:</label>
                <input type="text" id="q_resolucao" placeholder="Explique a resposta...">
            </div>
        </div>

        <button class="btn-enviar" onclick="salvarQuestao()">Publicar Questão</button>
    </div>

    <div class="sessao">
        <h3>📋 Materiais Postados</h3>
        <table class="tabela-gerenciamento">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Matéria</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody id="listaMateriaisAdmin"></tbody>
        </table>
    </div>

    <a href="index.html" class="voltar">⬅ Voltar para a Home do Site</a>
</div>

<script>
    function verificarAcesso() {
        const usuarioJson = localStorage.getItem("usuarioAtual");
        if (!usuarioJson) { window.location.href = "login.html"; return; }
        const usuario = JSON.parse(usuarioJson);
        if (usuario.cargo !== "professor") {
            alert("Área exclusiva para professores!");
            window.location.href = "index.html";
            return;
        }
        document.getElementById("boasVindas").innerText = "Olá, Mestre " + usuario.nome;
        renderizarListaMateriais();
    }

    function fazerLogout() {
        localStorage.removeItem("usuarioAtual");
        localStorage.removeItem("logado");
        window.location.href = "login.html";
    }

    function salvarNovoMaterial() {
        const nome = document.getElementById("mat_nome").value;
        const link = document.getElementById("mat_link").value;
        const materia = document.getElementById("mat_materia").value;
        if (!nome || !link) { alert("Preencha o nome e o link!"); return; }
        let banco = JSON.parse(localStorage.getItem("bancoMateriais")) || [];
        banco.push({ id: Date.now(), nome, link, materia });
        localStorage.setItem("bancoMateriais", JSON.stringify(banco));
        alert("Apostila publicada!");
        location.reload();
    }

    function renderizarListaMateriais() {
        const lista = document.getElementById("listaMateriaisAdmin");
        const banco = JSON.parse(localStorage.getItem("bancoMateriais")) || [];
        lista.innerHTML = banco.length === 0 ? "<tr><td colspan='3'>Nenhum material cadastrado.</td></tr>" : "";
        banco.forEach(item => {
            lista.innerHTML += `
                <tr>
                    <td>${item.nome}</td>
                    <td>${item.materia.toUpperCase()}</td>
                    <td><button class="btn-del" onclick="excluirMaterial(${item.id})">Apagar</button></td>
                </tr>
            `;
        });
    }

    function excluirMaterial(id) {
        if(confirm("Deseja apagar este material?")) {
            let banco = JSON.parse(localStorage.getItem("bancoMateriais"));
            banco = banco.filter(item => item.id !== id);
            localStorage.setItem("bancoMateriais", JSON.stringify(banco));
            renderizarListaMateriais();
        }
    }

    const baseAssuntos = {
        fisica: ["Cinemática", "Dinâmica", "Ondas", "Óptica", "Eletrodinâmica"],
        matematica: ["Funções", "Geometria", "Probabilidade"],
        historia: ["Brasil Colônia", "Brasil Império", "Idade Média", "Guerras Mundiais"],
        geografia: ["Cartografia", "Climatologia", "População"],
        biologia: ["Citologia", "Genética", "Ecologia", "Fisiologia"],
        quimica: ["Tabela Periódica", "Estequiometria", "Orgânica"],
        portugues: ["Gramática", "Literatura", "Interpretação"]
    };

    function atualizarAssuntos() {
        const materia = document.getElementById("q_materia").value;
        const combo = document.getElementById("q_assunto");
        combo.innerHTML = '<option value="">-- Selecione o assunto --</option>';
        if (materia && baseAssuntos[materia]) {
            baseAssuntos[materia].forEach(a => {
                let opt = document.createElement("option");
                opt.value = a.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, '_');
                opt.innerText = a;
                combo.appendChild(opt);
            });
        }
    }

    function salvarQuestao() {
        const questao = {
            id: Date.now(),
            materia: document.getElementById('q_materia').value,
            assunto: document.getElementById('q_assunto').value,
            imagem: document.getElementById('q_imagem').value,
            texto_apoio: document.getElementById('q_texto_apoio').value,
            pergunta: document.getElementById('q_pergunta').value,
            a: document.getElementById('q_a').value,
            b: document.getElementById('q_b').value,
            c: document.getElementById('q_c').value,
            d: document.getElementById('q_d').value,
            correta: document.getElementById('q_correta').value,
            resolucao: document.getElementById('q_resolucao').value
        };

        if (!questao.materia || !questao.pergunta) { alert("Preencha os campos obrigatórios!"); return; }

        let banco = JSON.parse(localStorage.getItem('bancoQuestoes')) || [];
        banco.push(questao);
        localStorage.setItem('bancoQuestoes', JSON.stringify(banco));
        alert("✅ Questão publicada!");
        location.reload();
    }

    window.onload = verificarAcesso;
</script>
</body>
</html>
