<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Mestre - Mundo CAVEST</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --success: #22c55e; --error: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 20px; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; }
        .form-card { background: var(--card); padding: 30px; border-radius: 15px; margin-bottom: 40px; border: 1px solid #334155; }
        .sessao { background: rgba(15, 23, 42, 0.4); padding: 20px; border-radius: 10px; border: 1px solid #334155; margin-bottom: 25px; }
        h2, h3 { color: var(--accent); margin-top: 0; text-transform: uppercase; font-size: 1.2rem; }
        label { display: block; margin-top: 15px; color: #94a3b8; font-size: 11px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-success { background: var(--success); color: white; }
        .btn-accent { background: var(--accent); color: #000; }
        .tabela { width: 100%; border-collapse: collapse; margin-top: 15px; background: #0f172a; border-radius: 8px; overflow: hidden; font-size: 14px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #334155; }
        .btn-del { background: var(--error); color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="form-card">
        <h2>🚀 Mundo CAVEST - Painel de Controle</h2>

        <div class="sessao">
            <h3>📚 Postar Apostila / PDF</h3>
            <div class="grid">
                <div><label>Título:</label><input type="text" id="mat_nome" placeholder="Ex: Lista de Exercícios"></div>
                <div>
                    <label>Disciplina:</label>
                    <select id="mat_materia">
                        <option value="fisica">Física</option>
                        <option value="biologia">Biologia</option>
                        <option value="quimica">Química</option>
                        <option value="matematica">Matemática</option>
                        <option value="historia">História</option>
                        <option value="geografia">Geografia</option>
                        <option value="portugues">Português</option>
                    </select>
                </div>
            </div>
            <label>Link do Google Drive:</label>
            <input type="text" id="mat_link" placeholder="Cole o link compartilhado aqui">
            <button id="btnPostarMaterial" class="btn btn-accent">Publicar Material</button>
        </div>

        <div class="sessao">
            <h3>📝 Criar Nova Questão</h3>
            <div class="grid">
                <div>
                    <label>Disciplina:</label>
                    <select id="q_materia" onchange="atualizarAssuntos()">
                        <option value="">Selecione...</option>
                        <option value="fisica">Física</option>
                        <option value="biologia">Biologia</option>
                        <option value="quimica">Química</option>
                        <option value="matematica">Matemática</option>
                        <option value="historia">História</option>
                        <option value="geografia">Geografia</option>
                        <option value="portugues">Português</option>
                    </select>
                </div>
                <div>
                    <label>Assunto Específico:</label>
                    <select id="q_assunto">
                        <option value="">Selecione a matéria...</option>
                    </select>
                </div>
            </div>
            
            <label>Link da Imagem (Opcional):</label>
            <input type="text" id="q_imagem" placeholder="URL da imagem (Google Drive, Imgur, etc)">

            <label>Texto de Apoio (Opcional):</label>
            <textarea id="q_apoio" rows="3" placeholder="Contexto ou texto base..."></textarea>

            <label>Enunciado / Comando:</label>
            <textarea id="q_pergunta" rows="3" placeholder="O comando da questão..."></textarea>
            
            <div class="grid">
                <input type="text" id="q_a" placeholder="Opção A">
                <input type="text" id="q_b" placeholder="Opção B">
                <input type="text" id="q_c" placeholder="Opção C">
                <input type="text" id="q_d" placeholder="Opção D">
            </div>
            
            <label>Alternativa Correta:</label>
            <select id="q_correta">
                <option value="a">A</option><option value="b">B</option><option value="c">C</option><option value="d">D</option>
            </select>

            <label style="color: #fbbf24;">💡 Resolução Comentada (Opcional):</label>
            <textarea id="q_resolucao" rows="4" placeholder="Explique como chegar na resposta correta..."></textarea>
            
            <button id="btnPostarQuestao" class="btn btn-success">Publicar Questão</button>
        </div>

        <div class="sessao">
            <h3>📋 Materiais Ativos</h3>
            <table class="tabela">
                <thead><tr><th>Nome</th><th>Matéria</th><th>Ação</th></tr></thead>
                <tbody id="listaMateriais"></tbody>
            </table>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCqMEbG7Uf03vNmEcIQa3uZhjV2npiw0_w",
        authDomain: "mundo-cavest.firebaseapp.com",
        projectId: "mundo-cavest",
        storageBucket: "mundo-cavest.appspot.com",
        messagingSenderId: "386396770156",
        appId: "1:386396770156:web:2c506fdb989e4c15e6ad49"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function carregarMateriais() {
        const querySnapshot = await getDocs(query(collection(db, "materiais"), orderBy("criadoEm", "desc")));
        const lista = document.getElementById("listaMateriais");
        lista.innerHTML = "";
        querySnapshot.forEach((documento) => {
            const item = documento.data();
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${item.nome}</td>
                <td><span style="color:#38bdf8">${item.materia.toUpperCase()}</span></td>
                <td><button class="btn-del" data-id="${documento.id}">Apagar</button></td>
            `;
            lista.appendChild(tr);
        });

        document.querySelectorAll('.btn-del').forEach(btn => {
            btn.onclick = async (e) => {
                if(confirm("Confirmar exclusão?")) {
                    await deleteDoc(doc(db, "materiais", e.target.getAttribute('data-id')));
                    carregarMateriais();
                }
            }
        });
    }

    document.getElementById("btnPostarMaterial").onclick = async () => {
        const dados = {
            nome: document.getElementById("mat_nome").value,
            link: document.getElementById("mat_link").value,
            materia: document.getElementById("mat_materia").value,
            criadoEm: Date.now()
        };
        if(!dados.nome || !dados.link) return alert("Preencha tudo!");
        await addDoc(collection(db, "materiais"), dados);
        alert("Material no ar!");
        carregarMateriais();
    };

    document.getElementById("btnPostarQuestao").onclick = async () => {
        const dados = {
            materia: document.getElementById("q_materia").value,
            assunto: document.getElementById("q_assunto").value,
            imagem: document.getElementById("q_imagem").value || "",
            textoApoio: document.getElementById("q_apoio").value || "",
            pergunta: document.getElementById("q_pergunta").value,
            a: document.getElementById("q_a").value,
            b: document.getElementById("q_b").value,
            c: document.getElementById("q_c").value,
            d: document.getElementById("q_d").value,
            correta: document.getElementById("q_correta").value,
            resolucao: document.getElementById("q_resolucao").value || "",
            criadoEm: Date.now()
        };
        
        if(!dados.pergunta || !dados.assunto || !dados.materia) return alert("Erro: Matéria, Assunto e Enunciado são obrigatórios!");
        
        await addDoc(collection(db, "questoes"), dados);
        alert("Questão postada!");
        location.reload();
    };

    carregarMateriais();
</script>

<script>
    const assuntosPorMateria = {
        fisica: ["cinematica", "dinamica", "eletrodinamica", "eletromagnetismo", "ondas", "optica", "termodinamica", "trabalho e energia"],
        biologia: ["Citologia", "Genética", "Ecologia", "Evolução", "Fisiologia Humana", "Botânica"],
        quimica: ["Estequiometria", "Química Orgânica", "Eletroquímica", "Termoquímica", "Ligações Químicas"],
        matematica: ["Funções", "Geometria Plana", "Geometria Espacial", "Trigonometria", "Análise Combinatória", "Probabilidade"],
        historia: ["Brasil Colônia", "Brasil Império", "República", "História Geral", "Antiguidade Clássica", "Guerra Fria"],
        geografia: ["Geografia Física", "Geopolítica", "Meio Ambiente", "Urbanização", "Demografia"],
        portugues: ["Gramática/Sintaxe", "Literatura Brasileira", "Interpretação de Texto", "Variação Linguística"]
    };

    function atualizarAssuntos() {
        const materia = document.getElementById("q_materia").value;
        const selectAssunto = document.getElementById("q_assunto");
        selectAssunto.innerHTML = '<option value="">Selecione o assunto...</option>';
        if (materia && assuntosPorMateria[materia]) {
            assuntosPorMateria[materia].forEach(ass => {
                const opt = document.createElement("option");
                opt.value = ass.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""); 
                opt.textContent = ass;
                selectAssunto.appendChild(opt);
            });
        }
    }
</script>
</body>
</html>
