<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Professor - Mundo CAVEST</title>
    <style>
        :root { --bg-dark: #0f172a; --card-bg: #1e293b; --accent: #38bdf8; --success: #22c55e; --error: #ef4444; --text-gray: #94a3b8; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg-dark); color: white; padding: 20px; margin: 0; }
        .form-card { background: var(--card-bg); padding: 30px; border-radius: 15px; max-width: 800px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2, h3 { color: var(--accent); text-transform: uppercase; }
        .sessao { margin-bottom: 25px; padding: 20px; background: rgba(15, 23, 42, 0.4); border-radius: 10px; border: 1px solid #334155; }
        label { display: block; margin-top: 15px; color: var(--text-gray); font-size: 11px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 12px; margin-top: 8px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        .grid-opcoes { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-enviar { width: 100%; padding: 15px; background: var(--success); color: white; font-weight: bold; border: none; cursor: pointer; border-radius: 8px; margin-top: 20px; font-size: 16px; }
        .voltar { display: block; text-align: center; margin-top: 30px; color: var(--text-gray); text-decoration: none; }
    </style>
</head>
<body>

<div class="form-card">
    <h2>🚀 Portal do Mestre - Mundo CAVEST</h2>

    <div class="sessao">
        <h3>📝 Criar Nova Questão</h3>
        <div class="grid-opcoes">
            <div>
                <label>Disciplina:</label>
                <select id="q_materia" onchange="atualizarAssuntos()">
                    <option value="">-- Selecione --</option>
                    <option value="fisica">Física</option>
                    <option value="matematica">Matemática</option>
                    <option value="biologia">Biologia</option>
                    <option value="quimica">Química</option>
                </select>
            </div>
            <div>
                <label>Assunto:</label>
                <select id="q_assunto">
                    <option value="">-- Selecione a matéria --</option>
                </select>
            </div>
        </div>

        <label>Enunciado da Questão:</label>
        <textarea id="q_pergunta" rows="4" placeholder="Digite o comando da questão aqui..."></textarea>
        
        <div class="grid-opcoes">
            <div><label>Opção A:</label><input type="text" id="q_a"></div>
            <div><label>Opção B:</label><input type="text" id="q_b"></div>
            <div><label>Opção C:</label><input type="text" id="q_c"></div>
            <div><label>Opção D:</label><input type="text" id="q_d"></div>
        </div>

        <label>Gabarito Correto:</label>
        <select id="q_correta">
            <option value="a">Alternativa A</option>
            <option value="b">Alternativa B</option>
            <option value="c">Alternativa C</option>
            <option value="d">Alternativa D</option>
        </select>

        <button class="btn-enviar" id="btnPublicar">Publicar Questão</button>
    </div>

    <a href="index.html" class="voltar">⬅ Voltar para a Home</a>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCqMEbG7Uf03vNmEcIQa3uZhjV2npiw0_w",
        authDomain: "mundo-cavest.firebaseapp.com",
        projectId: "mundo-cavest",
        storageBucket: "mundo-cavest.firebasestorage.app",
        messagingSenderId: "386396770156",
        appId: "1:386396770156:web:2c506fdb989e4c15e6ad49"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Lógica dos Assuntos
    const baseAssuntos = {
        fisica: ["Cinemática", "Dinâmica"],
        biologia: ["Genética", "Citologia", "Bioquimica"],
        matematica: ["Funções", "Geometria"],
        quimica: ["Orgânica"]
    };

    window.atualizarAssuntos = () => {
        const materia = document.getElementById("q_materia").value;
        const combo = document.getElementById("q_assunto");
        combo.innerHTML = '<option value="">-- Selecione o assunto --</option>';
        if (materia && baseAssuntos[materia]) {
            baseAssuntos[materia].forEach(a => {
                let opt = document.createElement("option");
                opt.value = a.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                opt.innerText = a;
                combo.appendChild(opt);
            });
        }
    };

    // Ação do Botão
    document.getElementById("btnPublicar").addEventListener("click", async () => {
        const questao = {
            materia: document.getElementById('q_materia').value,
            assunto: document.getElementById('q_assunto').value,
            pergunta: document.getElementById('q_pergunta').value,
            a: document.getElementById('q_a').value,
            b: document.getElementById('q_b').value,
            c: document.getElementById('q_c').value,
            d: document.getElementById('q_d').value,
            correta: document.getElementById('q_correta').value,
            data: Date.now()
        };

        if (!questao.materia || !questao.assunto || !questao.pergunta) {
            alert("Preencha os campos obrigatórios!");
            return;
        }

        try {
            await addDoc(collection(db, "questoes"), questao);
            alert("✅ Questão publicada com sucesso!");
            location.reload();
        } catch (e) {
            alert("Erro ao salvar: " + e.message);
        }
    });
</script>
</body>
</html>
