<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CAVEST - Estrutura Atômica</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: white;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #10b981; /* Emerald */
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
        }

        #container-questoes {
            max-width: 850px;
            margin: auto;
        }

        /* Painel de Partículas Mundo CAVEST */
        .atom-info-panel {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border-bottom: 4px solid #10b981;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            text-align: center;
        }

        .particle-card {
            background: #0f172a;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .particle-card b { display: block; margin-bottom: 5px; }
        .p-proton { color: #f87171; } /* Red for positive */
        .p-neutron { color: #94a3b8; } /* Gray for neutral */
        .p-electron { color: #60a5fa; } /* Blue for negative */

        .questao {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            border-left: 5px solid #10b981;
        }

        label {
            display: block;
            background: #334155;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        label:hover {
            background: #064e3b; /* Emerald-900 */
        }

        button {
            background: #10b981;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: #34d399;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        .resolucao-box {
            display: none;
            margin-top: 15px;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #10b981;
            line-height: 1.6;
        }

        .voltar {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #94a3b8;
            text-decoration: none;
        }

        .voltar:hover { color: #10b981; }
    </style>
</head>

<body>

    <h1>Química - Estrutura Atômica ⚛️</h1>

    <div id="container-questoes">
        <div class="atom-info-panel">
            <div class="particle-card"><b class="p-proton">Prótons (+)</b>Núcleo | Massa 1</div>
            <div class="particle-card"><b class="p-neutron">Nêutrons (0)</b>Núcleo | Massa 1</div>
            <div class="particle-card"><b class="p-electron">Elétrons (-)</b>Eletrosfera | Massa ~0</div>
        </div>

        <p style="text-align:center; color:#64748b; margin-bottom: 20px;">Explorando o coração da matéria...</p>
    </div>

    <a class="voltar" href="quimica.html">⬅ Voltar</a>

    <script>
    function carregarQuestoes() {
        const container = document.getElementById("container-questoes");
        const banco = JSON.parse(localStorage.getItem("bancoQuestoes")) || [];
        
        // Filtra por materia: quimica e assunto: atomistica (ou estrutura atomica)
        const filtradas = banco.filter(q => q.materia === "quimica" && (q.assunto === "atomistica" || q.assunto === "estrutura atomica"));
        const panelHtml = document.querySelector(".atom-info-panel").outerHTML;
        
        if (filtradas.length === 0) {
            container.innerHTML = panelHtml + "<p style='text-align:center; color:#94a3b8;'>Núcleo vazio. Adicione questões de estrutura atômica ao seu banco.</p>";
            return;
        }

        container.innerHTML = panelHtml; 

        filtradas.forEach((q, index) => {
            const div = document.createElement("div");
            div.className = "questao";

            div.innerHTML = `
                <p><b>${index + 1}.</b> ${q.pergunta}</p>
                <label><input type="radio" name="q${q.id}" value="a"> A) ${q.a}</label>
                <label><input type="radio" name="q${q.id}" value="b"> B) ${q.b}</label>
                <label><input type="radio" name="q${q.id}" value="c"> C) ${q.c}</label>
                <label><input type="radio" name="q${q.id}" value="d"> D) ${q.d}</label>
                
                <button onclick="verificar('${q.id}', '${q.correta}')">Sondar Átomo</button>
                <p id="feedback-${q.id}" style="margin-top:10px; font-weight:bold;"></p>
                
                <div id="res-${q.id}" class="resolucao-box">
                    <b style="color:#10b981;">Análise Microscópica:</b><br><br>
                    ${q.resolucao || "Lembre-se da distribuição das partículas e de suas respectivas cargas elétricas."}
                </div>
            `;
            container.appendChild(div);
        });
    }

    function verificar(id, correta) {
        const selecionada = document.querySelector(`input[name="q${id}"]:checked`);
        const feedback = document.getElementById(`feedback-${id}`);
        const resBox = document.getElementById(`res-${id}`);

        if (!selecionada) {
            alert("Identifique uma partícula antes de responder!");
            return;
        }

        const acertou = selecionada.value === correta;
        resBox.style.display = "block";

        if (acertou) {
            feedback.innerText = "✅ Correto! Estabilidade atômica alcançada.";
            feedback.style.color = "#10b981";
        } else {
            feedback.innerText = `❌ Incorreto. A configuração correta era a (${correta.toUpperCase()})`;
            feedback.style.color = "#f87171";
        }

        // Sistema de Progresso Mundo CAVEST
        let logado = localStorage.getItem("logado");
        if(logado){
            let usuario = JSON.parse(localStorage.getItem(logado));
            if(!usuario.questoesResolvidas) usuario.questoesResolvidas = [];
            
            if(!usuario.questoesResolvidas.includes(id)){
                usuario.respondidas = (usuario.respondidas || 0) + 1;
                if(acertou) usuario.acertos = (usuario.acertos || 0) + 1;
                usuario.questoesResolvidas.push(id);
                localStorage.setItem(logado, JSON.stringify(usuario));
            }
        }
    }

    window.onload = carregarQuestoes;
    </script>

</body>
</html>
