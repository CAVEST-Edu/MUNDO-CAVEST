<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CAVEST - Funções Matemáticas</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: white;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #10b981; /* Emerald */
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #container-questoes {
            max-width: 850px;
            margin: auto;
        }

        .function-map {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border-top: 5px solid #10b981;
            display: flex;
            justify-content: space-around;
            font-size: 0.85em;
        }

        .map-item {
            text-align: center;
            background: #0f172a;
            padding: 10px;
            border-radius: 8px;
            min-width: 120px;
        }

        .map-item b { color: #10b981; display: block; }

        .questao {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border-left: 4px solid #10b981;
        }

        label {
            display: block;
            background: #334155;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        label:hover {
            background: #064e3b;
        }

        button {
            background: #10b981;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: #34d399;
            transform: translateY(-2px);
        }

        .resolucao-box {
            display: none;
            margin-top: 15px;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #10b981;
            line-height: 1.6;
        }

        .voltar {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #94a3b8;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <h1>Matemática - Relações e Funções 📈</h1>

    <div id="container-questoes">
        <div class="function-map">
            <div class="map-item">
                <b>1º Grau (Linear)</b>
                f(x) = ax + b
            </div>
            <div class="map-item">
                <b>2º Grau (Quadrática)</b>
                f(x) = ax² + bx + c
            </div>
            <div class="map-item">
                <b>Exponencial</b>
                f(x) = aˣ
            </div>
        </div>

        <p style="text-align:center; color:#64748b;">Mapeando entradas e saídas...</p>
    </div>

    <a class="voltar" href="matematica.html">⬅ Voltar</a>

    <script>
    function carregarQuestoes() {
        const container = document.getElementById("container-questoes");
        const banco = JSON.parse(localStorage.getItem("bancoQuestoes")) || [];
        
        // Filtra por materia: matematica e assunto: funcoes
        const filtradas = banco.filter(q => q.materia === "matematica" && q.assunto === "funcoes");
        const mapHtml = document.querySelector(".function-map").outerHTML;
        
        if (filtradas.length === 0) {
            container.innerHTML = mapHtml + "<p style='text-align:center; color:#94a3b8;'>Nenhuma função mapeada no banco ainda.</p>";
            return;
        }

        container.innerHTML = mapHtml; 

        filtradas.forEach((q, index) => {
            const div = document.createElement("div");
            div.className = "questao";

            div.innerHTML = `
                <p><b>${index + 1}.</b> ${q.pergunta}</p>
                <label><input type="radio" name="q${q.id}" value="a"> A) ${q.a}</label>
                <label><input type="radio" name="q${q.id}" value="b"> B) ${q.b}</label>
                <label><input type="radio" name="q${q.id}" value="c"> C) ${q.c}</label>
                <label><input type="radio" name="q${q.id}" value="d"> D) ${q.d}</label>
                
                <button onclick="verificar('${q.id}', '${q.correta}')">Processar Função</button>
                <p id="feedback-${q.id}" style="margin-top:10px; font-weight:bold;"></p>
                
                <div id="res-${q.id}" class="resolucao-box">
                    <b style="color:#10b981;">Lógica de Associação:</b><br><br>
                    ${q.resolucao || "Analise como o valor de X se relaciona com o conjunto de saída Y."}
                </div>
            `;
            container.appendChild(div);
        });
    }

    function verificar(id, correta) {
        const selecionada = document.querySelector(`input[name="q${id}"]:checked`);
        const feedback = document.getElementById(`feedback-${id}`);
        const resBox = document.getElementById(`res-${id}`);

        if (!selecionada) {
            alert("Associe um elemento do domínio!");
            return;
        }

        const acertou = selecionada.value === correta;
        resBox.style.display = "block";

        if (acertou) {
            feedback.innerText = "✅ Correto! Relação perfeitamente definida.";
            feedback.style.color = "#10b981";
        } else {
            feedback.innerText = `❌ Incorreto. O contra-domínio esperava (${correta.toUpperCase()})`;
            feedback.style.color = "#f87171";
        }

        // Sistema de Progresso Mundo CAVEST
        let logado = localStorage.getItem("logado");
        if(logado){
            let usuario = JSON.parse(localStorage.getItem(logado));
            if(!usuario.questoesResolvidas) usuario.questoesResolvidas = [];
            
            if(!usuario.questoesResolvidas.includes(id)){
                usuario.respondidas = (usuario.respondidas || 0) + 1;
                if(acertou) usuario.acertos = (usuario.acertos || 0) + 1;
                usuario.questoesResolvidas.push(id);
                localStorage.setItem(logado, JSON.stringify(usuario));
            }
        }
    }

    window.onload = carregarQuestoes;
    </script>

</body>
</html>
