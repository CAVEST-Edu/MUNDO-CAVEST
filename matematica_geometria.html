<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CAVEST - Geometria</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: white;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #f59e0b; /* Amber */
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #container-questoes {
            max-width: 850px;
            margin: auto;
        }

        .geometry-hub {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border-top: 5px solid #f59e0b;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 10px;
        }

        .shape-card {
            background: #0f172a;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.8em;
            text-align: center;
            border: 1px solid #334155;
            flex: 1;
            min-width: 140px;
        }

        .shape-card b { color: #f59e0b; display: block; margin-bottom: 4px; }

        .questao {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border-right: 4px solid #f59e0b;
        }

        label {
            display: block;
            background: #334155;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        label:hover {
            background: #451a03; /* Amber-900 shadow */
        }

        button {
            background: #f59e0b;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: #fbbf24;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.4);
        }

        .resolucao-box {
            display: none;
            margin-top: 15px;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #f59e0b;
            line-height: 1.6;
        }

        .voltar {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #94a3b8;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <h1>Matemática - Espaço e Forma 📐</h1>

    <div id="container-questoes">
        <div class="geometry-hub">
            <div class="shape-card">
                <b>Quadrado</b>
                Área: L² <br> Perímetro: 4L
            </div>
            <div class="shape-card">
                <b>Círculo</b>
                Área: πr² <br> C: 2πr
            </div>
            <div class="shape-card">
                <b>Triângulo</b>
                Área: (b.h)/2 <br> Σ ângulos: 180°
            </div>
        </div>

        <p style="text-align:center; color:#64748b;">Calculando dimensões espaciais...</p>
    </div>

    <a class="voltar" href="matematica.html">⬅ Voltar</a>

    <script>
    function carregarQuestoes() {
        const container = document.getElementById("container-questoes");
        const banco = JSON.parse(localStorage.getItem("bancoQuestoes")) || [];
        
        // Filtra por materia: matematica e assunto: geometria
        const filtradas = banco.filter(q => q.materia === "matematica" && q.assunto === "geometria");
        const hubHtml = document.querySelector(".geometry-hub").outerHTML;
        
        if (filtradas.length === 0) {
            container.innerHTML = hubHtml + "<p style='text-align:center; color:#94a3b8;'>Plano euclidiano vazio. Adicione questões!</p>";
            return;
        }

        container.innerHTML = hubHtml; 

        filtradas.forEach((q, index) => {
            const div = document.createElement("div");
            div.className = "questao";

            div.innerHTML = `
                <p><b>${index + 1}.</b> ${q.pergunta}</p>
                <label><input type="radio" name="q${q.id}" value="a"> A) ${q.a}</label>
                <label><input type="radio" name="q${q.id}" value="b"> B) ${q.b}</label>
                <label><input type="radio" name="q${q.id}" value="c"> C) ${q.c}</label>
                <label><input type="radio" name="q${q.id}" value="d"> D) ${q.d}</label>
                
                <button onclick="verificar('${q.id}', '${q.correta}')">Medir Resultado</button>
                <p id="feedback-${q.id}" style="margin-top:10px; font-weight:bold;"></p>
                
                <div id="res-${q.id}" class="resolucao-box">
                    <b style="color:#f59e0b;">Demonstração Geométrica:</b><br><br>
                    ${q.resolucao || "Lembre-se das propriedades das formas e aplique a fórmula correspondente."}
                </div>
            `;
            container.appendChild(div);
        });
    }

    function verificar(id, correta) {
        const selecionada = document.querySelector(`input[name="q${id}"]:checked`);
        const feedback = document.getElementById(`feedback-${id}`);
        const resBox = document.getElementById(`res-${id}`);

        if (!selecionada) {
            alert("Trace uma resposta primeiro!");
            return;
        }

        const acertou = selecionada.value === correta;
        resBox.style.display = "block";

        if (acertou) {
            feedback.innerText = "✅ Correto! Forma e cálculo em harmonia.";
            feedback.style.color = "#f59e0b";
        } else {
            feedback.innerText = `❌ Incorreto. A medida exata era (${correta.toUpperCase()})`;
            feedback.style.color = "#f87171";
        }

        // Sistema de Progresso Mundo CAVEST
        let logado = localStorage.getItem("logado");
        if(logado){
            let usuario = JSON.parse(localStorage.getItem(logado));
            if(!usuario.questoesResolvidas) usuario.questoesResolvidas = [];
            
            if(!usuario.questoesResolvidas.includes(id)){
                usuario.respondidas = (usuario.respondidas || 0) + 1;
                if(acertou) usuario.acertos = (usuario.acertos || 0) + 1;
                usuario.questoesResolvidas.push(id);
                localStorage.setItem(logado, JSON.stringify(usuario));
            }
        }
    }

    window.onload = carregarQuestoes;
    </script>

</body>
</html>
