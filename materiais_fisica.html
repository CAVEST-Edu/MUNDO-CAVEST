<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Materiais de Física - Mundo CAVEST</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 20px;
            margin: 0;
        }

        h1 { color: #38bdf8; margin-top: 40px; margin-bottom: 30px; text-transform: uppercase; }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: auto;
        }

        /* Estilo dos Cards */
        .card-material {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            border-left: 4px solid #38bdf8;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #334155;
        }

        .card-material:hover {
            background: #1e3a8a;
            transform: translateY(-5px);
            border-left-color: #22c55e;
        }

        .card-material a {
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 18px;
            margin-top: 10px;
        }

        .tag {
            font-size: 10px;
            background: #38bdf8;
            color: #0f172a;
            padding: 3px 10px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .voltar {
            margin-top: 40px;
            display: inline-block;
            color: #94a3b8;
            text-decoration: none;
            font-size: 14px;
        }

        .voltar:hover { color: #38bdf8; }

        /* Loader */
        #status { color: #64748b; font-style: italic; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>📚 Materiais de Física</h1>

    <div class="container" id="listaMateriais">
        <p id="status">Buscando materiais na biblioteca...</p>
    </div>

    <a href="materiais.html" class="voltar">⬅ Voltar para Matérias</a>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCqMEbG7Uf03vNmEcIQa3uZhjV2npiw0_w",
            authDomain: "mundo-cavest.firebaseapp.com",
            projectId: "mundo-cavest",
            storageBucket: "mundo-cavest.appspot.com",
            messagingSenderId: "386396770156",
            appId: "1:386396770156:web:2c506fdb989e4c15e6ad49"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function buscarMateriais() {
            const container = document.getElementById("listaMateriais");
            const status = document.getElementById("status");

            try {
                // Busca na coleção 'materiais' apenas onde materia for 'fisica'
                const q = query(
                    collection(db, "materiais"), 
                    where("materia", "==", "fisica"),
                    orderBy("criadoEm", "desc")
                );

                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    status.innerText = "Nenhuma apostila extra postada ainda.";
                    return;
                }

                // Limpa o container e o status
                container.innerHTML = "";

                querySnapshot.forEach((doc) => {
                    const material = doc.data();
                    const div = document.createElement("div");
                    div.className = "card-material";
                    div.innerHTML = `
                        <span class="tag">PDF</span>
                        <a href="${material.link}" target="_blank">${material.nome}</a>
                    `;
                    container.appendChild(div);
                });

            } catch (error) {
                console.error("Erro ao carregar:", error);
                status.innerText = "Erro ao carregar materiais.";
            }
        }

        // Inicia a busca
        buscarMateriais();
    </script>

</body>
</html>
