<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CAVEST - Gramática Aplicada</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: white;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #a78bfa; /* Amethyst Purple */
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #container-questoes {
            max-width: 850px;
            margin: auto;
        }

        /* Painel de Regras Mundo CAVEST */
        .grammar-checklist {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border-top: 5px solid #a78bfa;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            font-size: 0.85em;
        }

        .check-item {
            background: #0f172a;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #334155;
            text-align: center;
        }

        .check-item b { color: #a78bfa; display: block; }

        .questao {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            border-right: 5px solid #a78bfa;
        }

        label {
            display: block;
            background: #334155;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        label:hover {
            background: #4c1d95; /* Deep Purple */
        }

        button {
            background: #a78bfa;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: #c4b5fd;
            transform: translateY(-2px);
        }

        .resolucao-box {
            display: none;
            margin-top: 15px;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #a78bfa;
            line-height: 1.6;
        }

        .voltar {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #94a3b8;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <h1>Português - Gramática e Norma Culta ✍️</h1>

    <div id="container-questoes">
        <div class="grammar-checklist">
            <div class="check-item"><b>Crase</b>A+A. Nunca antes de verbo ou masculino.</div>
            <div class="check-item"><b>Regência</b>Verbos pedem preposição? Assistir a, Visar a.</div>
            <div class="check-item"><b>Pontuação</b>Não se separa Sujeito de Verbo por vírgula.</div>
        </div>

        <p style="text-align:center; color:#64748b;">Refinando o domínio da linguagem padrão...</p>
    </div>

    <a class="voltar" href="portugues.html">⬅ Voltar</a>

    <script>
    function carregarQuestoes() {
        const container = document.getElementById("container-questoes");
        const banco = JSON.parse(localStorage.getItem("bancoQuestoes")) || [];
        
        // Filtra por materia: portugues e assunto: gramatica
        const filtradas = banco.filter(q => q.materia === "portugues" && q.assunto === "gramatica");
        const checklistHtml = document.querySelector(".grammar-checklist").outerHTML;
        
        if (filtradas.length === 0) {
            container.innerHTML = checklistHtml + "<p style='text-align:center; color:#94a3b8;'>Nenhum desvio gramatical detectado no banco.</p>";
            return;
        }

        container.innerHTML = checklistHtml; 

        filtradas.forEach((q, index) => {
            const div = document.createElement("div");
            div.className = "questao";

            div.innerHTML = `
                <p><b>${index + 1}.</b> ${q.pergunta}</p>
                <label><input type="radio" name="q${q.id}" value="a"> A) ${q.a}</label>
                <label><input type="radio" name="q${q.id}" value="b"> B) ${q.b}</label>
                <label><input type="radio" name="q${q.id}" value="c"> C) ${q.c}</label>
                <label><input type="radio" name="q${q.id}" value="d"> D) ${q.d}</label>
                
                <button onclick="verificar('${q.id}', '${q.correta}')">Analisar Norma Culta</button>
                <p id="feedback-${q.id}" style="margin-top:10px; font-weight:bold;"></p>
                
                <div id="res-${q.id}" class="resolucao-box">
                    <b style="color:#a78bfa;">Parecer Gramatical:</b><br><br>
                    ${q.resolucao || "Avalie a relação entre os termos da oração para aplicar a regra correta."}
                </div>
            `;
            container.appendChild(div);
        });
    }

    function verificar(id, correta) {
        const selecionada = document.querySelector(`input[name="q${id}"]:checked`);
        const feedback = document.getElementById(`feedback-${id}`);
        const resBox = document.getElementById(`res-${id}`);

        if (!selecionada) {
            alert("Selecione uma alternativa para análise!");
            return;
        }

        const acertou = selecionada.value === correta;
        resBox.style.display = "block";

        if (acertou) {
            feedback.innerText = "✅ Correto! Domínio pleno da norma padrão.";
            feedback.style.color = "#a78bfa";
        } else {
            feedback.innerText = `❌ Incorreto. A forma adequada seria a opção (${correta.toUpperCase()})`;
            feedback.style.color = "#f87171";
        }

        // Sistema de Progresso Mundo CAVEST
        let logado = localStorage.getItem("logado");
        if(logado){
            let usuario = JSON.parse(localStorage.getItem(logado));
            if(!usuario.questoesResolvidas) usuario.questoesResolvidas = [];
            
            if(!usuario.questoesResolvidas.includes(id)){
                usuario.respondidas = (usuario.respondidas || 0) + 1;
                if(acertou) usuario.acertos = (usuario.acertos || 0) + 1;
                usuario.questoesResolvidas.push(id);
                localStorage.setItem(logado, JSON.stringify(usuario));
            }
        }
    }

    window.onload = carregarQuestoes;
    </script>

</body>
</html>
