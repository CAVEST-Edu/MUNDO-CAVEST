<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CAVEST - Vocabulary & Idioms</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: white;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #a78bfa; /* Soft Purple */
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #container-questoes {
            max-width: 800px;
            margin: auto;
        }

        .vocab-header {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border-bottom: 4px solid #a78bfa;
        }

        .false-friends-list {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .tag {
            background: #4c1d95;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            color: #ddd6fe;
        }

        .questao {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        label {
            display: block;
            background: #334155;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        label:hover {
            background: #5b21b6;
            transform: translateX(5px);
        }

        button {
            background: #a78bfa;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: #c4b5fd;
            box-shadow: 0 0 15px rgba(167, 139, 250, 0.4);
        }

        .resolucao-box {
            display: none;
            margin-top: 15px;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid #a78bfa;
            font-size: 0.9em;
        }

        .voltar {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #94a3b8;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <h1>English - Beyond Words 🧠💬</h1>

    <div id="container-questoes">
        <div class="vocab-header">
            <h3 style="margin-top:0;">🚫 Watch Out! False Friends</h3>
            <div class="false-friends-list">
                <span class="tag"><b>Actually</b> = Na verdade</span>
                <span class="tag"><b>Parents</b> = Pais</span>
                <span class="tag"><b>Library</b> = Biblioteca</span>
                <span class="tag"><b>Pretend</b> = Fingir</span>
            </div>
        </div>

        <p style="text-align:center; color:#64748b;">Desvendando expressões e significados ocultos...</p>
    </div>

    <a class="voltar" href="ingles.html">⬅ Voltar</a>

    <script>
    function carregarQuestoes() {
        const container = document.getElementById("container-questoes");
        const banco = JSON.parse(localStorage.getItem("bancoQuestoes")) || [];
        
        const filtradas = banco.filter(q => q.materia === "ingles" && q.assunto === "vocabulario");
        const headerHtml = document.querySelector(".vocab-header").outerHTML;
        
        if (filtradas.length === 0) {
            container.innerHTML = headerHtml + "<p style='text-align:center; color:#94a3b8;'>Vocabulary bank is currently empty.</p>";
            return;
        }

        container.innerHTML = headerHtml; 

        filtradas.forEach((q, index) => {
            const div = document.createElement("div");
            div.className = "questao";

            div.innerHTML = `
                <p><b>${index + 1}.</b> ${q.pergunta}</p>
                <label><input type="radio" name="q${q.id}" value="a"> A) ${q.a}</label>
                <label><input type="radio" name="q${q.id}" value="b"> B) ${q.b}</label>
                <label><input type="radio" name="q${q.id}" value="c"> C) ${q.c}</label>
                <label><input type="radio" name="q${q.id}" value="d"> D) ${q.d}</label>
                
                <button onclick="verificar('${q.id}', '${q.correta}')">Translate Intent</button>
                <p id="feedback-${q.id}" style="margin-top:10px; font-weight:bold;"></p>
                
                <div id="res-${q.id}" class="resolucao-box">
                    <b style="color:#a78bfa;">Semantic Insight:</b><br><br>
                    ${q.resolucao || "Analyze the context to find the idiomatic meaning."}
                </div>
            `;
            container.appendChild(div);
        });
    }

    function verificar(id, correta) {
        const selecionada = document.querySelector(`input[name="q${id}"]:checked`);
        const feedback = document.getElementById(`feedback-${id}`);
        const resBox = document.getElementById(`res-${id}`);

        if (!selecionada) {
            alert("Pick a meaning first!");
            return;
        }

        const acertou = selecionada.value === correta;
        resBox.style.display = "block";

        if (acertou) {
            feedback.innerText = "✅ Correct! You're thinking like a native.";
            feedback.style.color = "#a78bfa";
        } else {
            feedback.innerText = `❌ Wrong. The true meaning was (${correta.toUpperCase()})`;
            feedback.style.color = "#f87171";
        }

        // Progresso Mundo CAVEST
        let logado = localStorage.getItem("logado");
        if(logado){
            let usuario = JSON.parse(localStorage.getItem(logado));
            if(!usuario.questoesResolvidas) usuario.questoesResolvidas = [];
            
            if(!usuario.questoesResolvidas.includes(id)){
                usuario.respondidas = (usuario.respondidas || 0) + 1;
                if(acertou) usuario.acertos = (usuario.acertos || 0) + 1;
                usuario.questoesResolvidas.push(id);
                localStorage.setItem(logado, JSON.stringify(usuario));
            }
        }
    }

    window.onload = carregarQuestoes;
    </script>

</body>
</html>
