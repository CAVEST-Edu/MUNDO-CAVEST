<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CAVEST - Química Orgânica</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: white;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #84cc16; /* Lime Green */
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(132, 204, 22, 0.2);
        }

        #container-questoes {
            max-width: 850px;
            margin: auto;
        }

        /* Painel do Carbono Mundo CAVEST */
        .organic-header {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border-top: 5px solid #84cc16;
            display: flex;
            justify-content: space-around;
            gap: 10px;
        }

        .carbon-rule {
            flex: 1;
            background: #0f172a;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.85em;
            border: 1px solid #334155;
        }

        .carbon-rule b { color: #84cc16; display: block; margin-bottom: 5px; }

        .questao {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            border-left: 5px solid #84cc16;
        }

        label {
            display: block;
            background: #334155;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        label:hover {
            background: #365314; /* Lime-900 */
        }

        button {
            background: #84cc16;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: #a3e635;
            transform: translateY(-2px);
        }

        .resolucao-box {
            display: none;
            margin-top: 15px;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed #84cc16;
            line-height: 1.6;
        }

        .voltar {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #94a3b8;
            text-decoration: none;
        }

        .voltar:hover { color: #84cc16; }
    </style>
</head>

<body>

    <h1>Química - Química Orgânica 🌿</h1>

    <div id="container-questoes">
        <div class="organic-header">
            <div class="carbon-rule"><b>Tetravalência</b>O Carbono faz exatamente 4 ligações.</div>
            <div class="carbon-rule"><b>Encadeamento</b>Capacidade única de formar cadeias longas.</div>
            <div class="carbon-rule"><b>Ligações</b>Simples, duplas ou triplas (σ e π).</div>
        </div>

        <p style="text-align:center; color:#64748b; margin-bottom: 20px;">Desvendando as moléculas da vida...</p>
    </div>

     <a class="voltar" href="quimica.html">⬅ Voltar</a>

    <script>
    function carregarQuestoes() {
        const container = document.getElementById("container-questoes");
        const banco = JSON.parse(localStorage.getItem("bancoQuestoes")) || [];
        
        // Filtra por materia: quimica e assunto: organica
        const filtradas = banco.filter(q => q.materia === "quimica" && (q.assunto === "organica" || q.assunto === "quimica organica"));
        const headerHtml = document.querySelector(".organic-header").outerHTML;
        
        if (filtradas.length === 0) {
            container.innerHTML = headerHtml + "<p style='text-align:center; color:#94a3b8;'>Cadeia carbônica vazia. Adicione questões de orgânica ao banco.</p>";
            return;
        }

        container.innerHTML = headerHtml; 

        filtradas.forEach((q, index) => {
            const div = document.createElement("div");
            div.className = "questao";

            div.innerHTML = `
                <p><b>${index + 1}.</b> ${q.pergunta}</p>
                <label><input type="radio" name="q${q.id}" value="a"> A) ${q.a}</label>
                <label><input type="radio" name="q${q.id}" value="b"> B) ${q.b}</label>
                <label><input type="radio" name="q${q.id}" value="c"> C) ${q.c}</label>
                <label><input type="radio" name="q${q.id}" value="d"> D) ${q.d}</label>
                
                <button onclick="verificar('${q.id}', '${q.correta}')">Analisar Cadeia</button>
                <p id="feedback-${q.id}" style="margin-top:10px; font-weight:bold;"></p>
                
                <div id="res-${q.id}" class="resolucao-box">
                    <b style="color:#84cc16;">Estudo da Estrutura:</b><br><br>
                    ${q.resolucao || "Observe os prefixos (nº de carbonos), infixos (tipo de ligação) e sufixos (grupo funcional)."}
                </div>
            `;
            container.appendChild(div);
        });
    }

    function verificar(id, correta) {
        const selecionada = document.querySelector(`input[name="q${id}"]:checked`);
        const feedback = document.getElementById(`feedback-${id}`);
        const resBox = document.getElementById(`res-${id}`);

        if (!selecionada) {
            alert("Identifique o grupo funcional antes de responder!");
            return;
        }

        const acertou = selecionada.value === correta;
        resBox.style.display = "block";

        if (acertou) {
            feedback.innerText = "✅ Correto! Nomenclatura e estrutura em harmonia.";
            feedback.style.color = "#84cc16";
        } else {
            feedback.innerText = `❌ Incorreto. A configuração orgânica correta era a (${correta.toUpperCase()})`;
            feedback.style.color = "#f87171";
        }

        // Sistema de Progresso Mundo CAVEST
        let logado = localStorage.getItem("logado");
        if(logado){
            let usuario = JSON.parse(localStorage.getItem(logado));
            if(!usuario.questoesResolvidas) usuario.questoesResolvidas = [];
            
            if(!usuario.questoesResolvidas.includes(id)){
                usuario.respondidas = (usuario.respondidas || 0) + 1;
                if(acertou) usuario.acertos = (usuario.acertos || 0) + 1;
                usuario.questoesResolvidas.push(id);
                localStorage.setItem(logado, JSON.stringify(usuario));
            }
        }
    }

    window.onload = carregarQuestoes;
    </script>

</body>
</html>
