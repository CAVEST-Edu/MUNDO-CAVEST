<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CAVEST - Termoquímica</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: white;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #f97316; /* Orange */
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(249, 115, 22, 0.2);
        }

        #container-questoes {
            max-width: 850px;
            margin: auto;
        }

        /* Monitor de Fluxo Térmico Mundo CAVEST */
        .thermal-monitor {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border-bottom: 4px solid #f97316;
            display: flex;
            justify-content: space-around;
            gap: 15px;
        }

        .thermal-card {
            flex: 1;
            background: #0f172a;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #334155;
        }

        .exo { color: #f87171; border-color: #f87171; } /* Warm */
        .endo { color: #60a5fa; border-color: #60a5fa; } /* Cold */
        
        .thermal-card b { display: block; margin-bottom: 5px; text-transform: uppercase; font-size: 0.8em; }

        .questao {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            border-left: 5px solid #f97316;
        }

        label {
            display: block;
            background: #334155;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        label:hover {
            background: #7c2d12; /* Orange-900 */
        }

        button {
            background: #f97316;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: #fb923c;
            transform: scale(1.02);
        }

        .resolucao-box {
            display: none;
            margin-top: 15px;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #f97316;
            line-height: 1.6;
        }

        .voltar {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #94a3b8;
            text-decoration: none;
        }

        .voltar:hover { color: #f97316; }
    </style>
</head>

<body>

    <h1>Química - Termoquímica 🔥🧊</h1>

    <div id="container-questoes">
        <div class="thermal-monitor">
            <div class="thermal-card exo">
                <b>Exotérmica</b>
                Libera Calor (ΔH < 0)<br>Sensação de Aquecimento
            </div>
            <div class="thermal-card endo">
                <b>Endotérmica</b>
                Absorve Calor (ΔH > 0)<br>Sensação de Resfriamento
            </div>
        </div>

        <p style="text-align:center; color:#64748b; margin-bottom: 20px;">Medindo a variação de entalpia nas reações...</p>
    </div>

     <a class="voltar" href="quimica.html">⬅ Voltar</a>

    <script>
    function carregarQuestoes() {
        const container = document.getElementById("container-questoes");
        const banco = JSON.parse(localStorage.getItem("bancoQuestoes")) || [];
        
        // Filtra por materia: quimica e assunto: termoquimica
        const filtradas = banco.filter(q => q.materia === "quimica" && (q.assunto === "termoquimica"));
        const monitorHtml = document.querySelector(".thermal-monitor").outerHTML;
        
        if (filtradas.length === 0) {
            container.innerHTML = monitorHtml + "<p style='text-align:center; color:#94a3b8;'>Calorímetro vazio. Adicione questões de Termoquímica ao banco.</p>";
            return;
        }

        container.innerHTML = monitorHtml; 

        filtradas.forEach((q, index) => {
            const div = document.createElement("div");
            div.className = "questao";

            div.innerHTML = `
                <p><b>${index + 1}.</b> ${q.pergunta}</p>
                <label><input type="radio" name="q${q.id}" value="a"> A) ${q.a}</label>
                <label><input type="radio" name="q${q.id}" value="b"> B) ${q.b}</label>
                <label><input type="radio" name="q${q.id}" value="c"> C) ${q.c}</label>
                <label><input type="radio" name="q${q.id}" value="d"> D) ${q.d}</label>
                
                <button onclick="verificar('${q.id}', '${q.correta}')">Medir Energia</button>
                <p id="feedback-${q.id}" style="margin-top:10px; font-weight:bold;"></p>
                
                <div id="res-${q.id}" class="resolucao-box">
                    <b style="color:#f97316;">Análise Entálpica:</b><br><br>
                    ${q.resolucao || "Verifique se o sistema está ganhando ou perdendo energia para definir o sinal do ΔH."}
                </div>
            `;
            container.appendChild(div);
        });
    }

    function verificar(id, correta) {
        const selecionada = document.querySelector(`input[name="q${id}"]:checked`);
        const feedback = document.getElementById(`feedback-${id}`);
        const resBox = document.getElementById(`res-${id}`);

        if (!selecionada) {
            alert("Inicie a reação selecionando uma alternativa!");
            return;
        }

        const acertou = selecionada.value === correta;
        resBox.style.display = "block";

        if (acertou) {
            feedback.innerText = "✅ Correto! Equilíbrio térmico atingido.";
            feedback.style.color = "#f97316";
        } else {
            feedback.innerText = `❌ Incorreto. A variação energética correta era a (${correta.toUpperCase()})`;
            feedback.style.color = "#f87171";
        }

        // Sistema de Progresso Mundo CAVEST
        let logado = localStorage.getItem("logado");
        if(logado){
            let usuario = JSON.parse(localStorage.getItem(logado));
            if(!usuario.questoesResolvidas) usuario.questoesResolvidas = [];
            
            if(!usuario.questoesResolvidas.includes(id)){
                usuario.respondidas = (usuario.respondidas || 0) + 1;
                if(acertou) usuario.acertos = (usuario.acertos || 0) + 1;
                usuario.questoesResolvidas.push(id);
                localStorage.setItem(logado, JSON.stringify(usuario));
            }
        }
    }

    window.onload = carregarQuestoes;
    </script>

</body>
</html>
