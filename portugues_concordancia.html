<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CAVEST - Concordância</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: white;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #10b981; /* Emerald */
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #container-questoes {
            max-width: 850px;
            margin: auto;
        }

        /* Painel de Regras Mundo CAVEST */
        .agreement-rules {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border-top: 5px solid #10b981;
            display: flex;
            justify-content: space-around;
            font-size: 0.85em;
        }

        .rule-item {
            background: #0f172a;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #334155;
            text-align: center;
        }

        .rule-item b { color: #10b981; }

        .questao {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            border-left: 5px solid #10b981;
        }

        label {
            display: block;
            background: #334155;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        label:hover {
            background: #064e3b; /* Emerald-900 */
        }

        button {
            background: #10b981;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: #34d399;
            transform: scale(1.02);
        }

        .resolucao-box {
            display: none;
            margin-top: 15px;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed #10b981;
            line-height: 1.6;
        }

        .voltar {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #94a3b8;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <h1>Português - Concordância Verbal e Nominal 🤝</h1>

    <div id="container-questoes">
        <div class="agreement-rules">
            <div class="rule-item"><b>Verbo HAVER:</b> No sentido de "existir" é sempre singular.</div>
            <div class="rule-item"><b>Verbo FAZER:</b> Indicando tempo é sempre singular.</div>
            <div class="rule-item"><b>MESMO/ANEXO:</b> Concordam com o substantivo.</div>
        </div>

        <p style="text-align:center; color:#64748b;">Ajustando a harmonia entre as classes gramaticais...</p>
    </div>

    <a class="voltar" href="portugues.html">⬅ Voltar</a>

    <script>
    function carregarQuestoes() {
        const container = document.getElementById("container-questoes");
        const banco = JSON.parse(localStorage.getItem("bancoQuestoes")) || [];
        
        // Filtra por materia: portugues e assunto: concordancia
        const filtradas = banco.filter(q => q.materia === "portugues" && q.assunto === "concordancia");
        const rulesHtml = document.querySelector(".agreement-rules").outerHTML;
        
        if (filtradas.length === 0) {
            container.innerHTML = rulesHtml + "<p style='text-align:center; color:#94a3b8;'>Tudo em paz por aqui. Nenhuma questão de concordância encontrada.</p>";
            return;
        }

        container.innerHTML = rulesHtml; 

        filtradas.forEach((q, index) => {
            const div = document.createElement("div");
            div.className = "questao";

            div.innerHTML = `
                <p><b>${index + 1}.</b> ${q.pergunta}</p>
                <label><input type="radio" name="q${q.id}" value="a"> A) ${q.a}</label>
                <label><input type="radio" name="q${q.id}" value="b"> B) ${q.b}</label>
                <label><input type="radio" name="q${q.id}" value="c"> C) ${q.c}</label>
                <label><input type="radio" name="q${q.id}" value="d"> D) ${q.d}</label>
                
                <button onclick="verificar('${q.id}', '${q.correta}')">Validar Concordância</button>
                <p id="feedback-${q.id}" style="margin-top:10px; font-weight:bold;"></p>
                
                <div id="res-${q.id}" class="resolucao-box">
                    <b style="color:#10b981;">Análise Sintática:</b><br><br>
                    ${q.resolucao || "Verifique o sujeito e a regra de impessoalidade para este caso."}
                </div>
            `;
            container.appendChild(div);
        });
    }

    function verificar(id, correta) {
        const selecionada = document.querySelector(`input[name="q${id}"]:checked`);
        const feedback = document.getElementById(`feedback-${id}`);
        const resBox = document.getElementById(`res-${id}`);

        if (!selecionada) {
            alert("Selecione uma opção para verificar a harmonia!");
            return;
        }

        const acertou = selecionada.value === correta;
        resBox.style.display = "block";

        if (acertou) {
            feedback.innerText = "✅ Correto! Concordância perfeita.";
            feedback.style.color = "#10b981";
        } else {
            feedback.innerText = `❌ Incorreto. O ajuste gramatical exigia a opção (${correta.toUpperCase()})`;
            feedback.style.color = "#f87171";
        }

        // Sistema de Progresso Mundo CAVEST
        let logado = localStorage.getItem("logado");
        if(logado){
            let usuario = JSON.parse(localStorage.getItem(logado));
            if(!usuario.questoesResolvidas) usuario.questoesResolvidas = [];
            
            if(!usuario.questoesResolvidas.includes(id)){
                usuario.respondidas = (usuario.respondidas || 0) + 1;
                if(acertou) usuario.acertos = (usuario.acertos || 0) + 1;
                usuario.questoesResolvidas.push(id);
                localStorage.setItem(logado, JSON.stringify(usuario));
            }
        }
    }

    window.onload = carregarQuestoes;
    </script>

</body>
</html>
