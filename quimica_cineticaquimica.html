<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CAVEST - Cinética Química</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: white;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #38bdf8; /* Sky Blue */
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }

        #container-questoes {
            max-width: 850px;
            margin: auto;
        }

        /* Dashboard de Reação Mundo CAVEST */
        .reaction-stats {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border-left: 5px solid #22c55e;
            display: flex;
            justify-content: space-around;
            font-size: 0.85em;
        }

        .stat-item {
            text-align: center;
        }

        .stat-item b { color: #22c55e; display: block; margin-bottom: 5px; }

        .questao {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            transition: transform 0.2s;
        }

        .questao:hover {
            transform: scale(1.01);
        }

        label {
            display: block;
            background: #334155;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        label:hover {
            background: #075985; /* Sky Blue-900 */
        }

        button {
            background: #22c55e;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: #4ade80;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.4);
        }

        .resolucao-box {
            display: none;
            margin-top: 15px;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #38bdf8;
            line-height: 1.6;
        }

        .voltar {
            display: block;
            text-align: center;
            margin: 30px auto;
            color: #94a3b8;
            text-decoration: none;
            width: fit-content;
            border-bottom: 1px solid transparent;
        }

        .voltar:hover {
            color: #38bdf8;
            border-bottom-color: #38bdf8;
        }
    </style>
</head>

<body>

    <h1>Química - Cinética Química ⚗️</h1>

    <div id="container-questoes">
        <div class="reaction-stats">
            <div class="stat-item"><b>Temperatura</b>Aumenta K e Choques</div>
            <div class="stat-item"><b>Concentração</b>Mais colisões/tempo</div>
            <div class="stat-item"><b>Catalisador</b>Menor Ea (E. Ativação)</div>
        </div>

        <p style="text-align:center; color:#64748b; margin-bottom: 20px;">Analisando a rapidez das transformações moleculares...</p>
    </div>

    <a class="voltar" href="quimica.html">⬅ Voltar</a>

    <script>
    function carregarQuestoes() {
        const container = document.getElementById("container-questoes");
        const banco = JSON.parse(localStorage.getItem("bancoQuestoes")) || [];
        
        // Filtra por materia: quimica e assunto: cinetica
        const filtradas = banco.filter(q => q.materia === "quimica" && q.assunto === "cinetica");
        const statsHtml = document.querySelector(".reaction-stats").outerHTML;
        
        if (filtradas.length === 0) {
            container.innerHTML = statsHtml + "<p style='text-align:center; color:#94a3b8;'>Reação em repouso. Nenhuma questão de cinética encontrada no banco.</p>";
            return;
        }

        container.innerHTML = statsHtml; 

        filtradas.forEach((q, index) => {
            const div = document.createElement("div");
            div.className = "questao";

            div.innerHTML = `
                <p><b>${index + 1}.</b> ${q.pergunta}</p>
                <label><input type="radio" name="q${q.id}" value="a"> A) ${q.a}</label>
                <label><input type="radio" name="q${q.id}" value="b"> B) ${q.b}</label>
                <label><input type="radio" name="q${q.id}" value="c"> C) ${q.c}</label>
                <label><input type="radio" name="q${q.id}" value="d"> D) ${q.d}</label>
                
                <button onclick="verificar('${q.id}', '${q.correta}')">Disparar Reação</button>
                <p id="feedback-${q.id}" style="margin-top:10px; font-weight:bold;"></p>
                
                <div id="res-${q.id}" class="resolucao-box">
                    <b style="color:#38bdf8;">Mecanismo da Reação:</b><br><br>
                    ${q.resolucao || "Avalie os choques moleculares e a barreira energética para determinar a velocidade do processo."}
                </div>
            `;
            container.appendChild(div);
        });
    }

    function verificar(id, correta) {
        const selecionada = document.querySelector(`input[name="q${id}"]:checked`);
        const feedback = document.getElementById(`feedback-${id}`);
        const resBox = document.getElementById(`res-${id}`);

        if (!selecionada) {
            alert("Selecione um reagente antes de disparar!");
            return;
        }

        const acertou = selecionada.value === correta;
        resBox.style.display = "block";

        if (acertou) {
            feedback.innerText = "✅ Correto! Reação concluída com sucesso.";
            feedback.style.color = "#22c55e";
        } else {
            feedback.innerText = `❌ Incorreto. O fator determinante era a opção (${correta.toUpperCase()})`;
            feedback.style.color = "#f87171";
        }

        // Sistema de Progresso Mundo CAVEST
        let logado = localStorage.getItem("logado");
        if(logado){
            let usuario = JSON.parse(localStorage.getItem(logado));
            if(!usuario.questoesResolvidas) usuario.questoesResolvidas = [];
            
            if(!usuario.questoesResolvidas.includes(id)){
                usuario.respondidas = (usuario.respondidas || 0) + 1;
                if(acertou) usuario.acertos = (usuario.acertos || 0) + 1;
                usuario.questoesResolvidas.push(id);
                localStorage.setItem(logado, JSON.stringify(usuario));
            }
        }
    }

    window.onload = carregarQuestoes;
    </script>

</body>
</html>
