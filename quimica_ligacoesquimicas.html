<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CAVEST - Ligações Químicas</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: white;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #f472b6; /* Pink/Violet */
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(244, 114, 182, 0.2);
        }

        #container-questoes {
            max-width: 850px;
            margin: auto;
        }

        /* Resumo de Forças Mundo CAVEST */
        .bonding-summary {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border-bottom: 4px solid #f472b6;
            display: flex;
            justify-content: space-around;
            text-align: center;
            font-size: 0.85em;
        }

        .bond-type b { color: #f472b6; display: block; margin-bottom: 5px; }

        .questao {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            border-right: 5px solid #f472b6;
        }

        label {
            display: block;
            background: #334155;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        label:hover {
            background: #701a75; /* Fuchsia-900 */
        }

        button {
            background: #f472b6;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: #fb7185;
            transform: scale(1.05);
        }

        .resolucao-box {
            display: none;
            margin-top: 15px;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #f472b6;
            line-height: 1.6;
        }

        .voltar {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #94a3b8;
            text-decoration: none;
        }

        .voltar:hover { color: #f472b6; }
    </style>
</head>

<body>

    <h1>Química - Ligações Químicas 🤝</h1>

    <div id="container-questoes">
        <div class="bonding-summary">
            <div class="bond-type"><b>Iônica</b>Transferência<br>(Metal + Ametal)</div>
            <div class="bond-type"><b>Covalente</b>Compartilhamento<br>(Ametal + Ametal)</div>
            <div class="bond-type"><b>Metálica</b>Nuvem de Elétrons<br>(Metal + Metal)</div>
        </div>

        <p style="text-align:center; color:#64748b; margin-bottom: 20px;">Analisando as uniões atômicas e a Regra do Octeto...</p>
    </div>

    <a class="voltar" href="quimica.html">⬅ Voltar</a>

    <script>
    function carregarQuestoes() {
        const container = document.getElementById("container-questoes");
        const banco = JSON.parse(localStorage.getItem("bancoQuestoes")) || [];
        
        // Filtra por materia: quimica e assunto: ligacoes
        const filtradas = banco.filter(q => q.materia === "quimica" && (q.assunto === "ligacoes" || q.assunto === "ligacoes quimicas"));
        const summaryHtml = document.querySelector(".bonding-summary").outerHTML;
        
        if (filtradas.length === 0) {
            container.innerHTML = summaryHtml + "<p style='text-align:center; color:#94a3b8;'>Átomos isolados. Adicione questões de ligações químicas ao banco.</p>";
            return;
        }

        container.innerHTML = summaryHtml; 

        filtradas.forEach((q, index) => {
            const div = document.createElement("div");
            div.className = "questao";

            div.innerHTML = `
                <p><b>${index + 1}.</b> ${q.pergunta}</p>
                <label><input type="radio" name="q${q.id}" value="a"> A) ${q.a}</label>
                <label><input type="radio" name="q${q.id}" value="b"> B) ${q.b}</label>
                <label><input type="radio" name="q${q.id}" value="c"> C) ${q.c}</label>
                <label><input type="radio" name="q${q.id}" value="d"> D) ${q.d}</label>
                
                <button onclick="verificar('${q.id}', '${q.correta}')">Verificar Estabilidade</button>
                <p id="feedback-${q.id}" style="margin-top:10px; font-weight:bold;"></p>
                
                <div id="res-${q.id}" class="resolucao-box">
                    <b style="color:#f472b6;">Mecanismo de Ligação:</b><br><br>
                    ${q.resolucao || "Avalie a eletronegatividade e a natureza dos elementos envolvidos para identificar o tipo de interação."}
                </div>
            `;
            container.appendChild(div);
        });
    }

    function verificar(id, correta) {
        const selecionada = document.querySelector(`input[name="q${id}"]:checked`);
        const feedback = document.getElementById(`feedback-${id}`);
        const resBox = document.getElementById(`res-${id}`);

        if (!selecionada) {
            alert("Selecione uma alternativa para formar a molécula!");
            return;
        }

        const acertou = selecionada.value === correta;
        resBox.style.display = "block";

        if (acertou) {
            feedback.innerText = "✅ Correto! Ligação estabelecida com sucesso.";
            feedback.style.color = "#f472b6";
        } else {
            feedback.innerText = `❌ Incorreto. A interação correta era a (${correta.toUpperCase()})`;
            feedback.style.color = "#f87171";
        }

        // Sistema de Progresso Mundo CAVEST
        let logado = localStorage.getItem("logado");
        if(logado){
            let usuario = JSON.parse(localStorage.getItem(logado));
            if(!usuario.questoesResolvidas) usuario.questoesResolvidas = [];
            
            if(!usuario.questoesResolvidas.includes(id)){
                usuario.respondidas = (usuario.respondidas || 0) + 1;
                if(acertou) usuario.acertos = (usuario.acertos || 0) + 1;
                usuario.questoesResolvidas.push(id);
                localStorage.setItem(logado, JSON.stringify(usuario));
            }
        }
    }

    window.onload = carregarQuestoes;
    </script>

</body>
</html>
