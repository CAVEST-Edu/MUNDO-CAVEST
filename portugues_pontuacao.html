<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CAVEST - Pontuação</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: white;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #22d3ee; /* Cyan */
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #container-questoes {
            max-width: 850px;
            margin: auto;
        }

        /* Painel de Regras de Ouro Mundo CAVEST */
        .punctuation-rules {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border-top: 5px solid #22d3ee;
            display: flex;
            gap: 15px;
            font-size: 0.85em;
        }

        .rule-card {
            flex: 1;
            background: #0f172a;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #334155;
            text-align: center;
        }

        .rule-card b { color: #22d3ee; display: block; margin-bottom: 5px; }

        .questao {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            border-left: 5px solid #22d3ee;
        }

        label {
            display: block;
            background: #334155;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        label:hover {
            background: #164e63; /* Cyan-900 */
        }

        button {
            background: #22d3ee;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: #67e8f9;
            transform: translateY(-2px);
        }

        .resolucao-box {
            display: none;
            margin-top: 15px;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed #22d3ee;
            line-height: 1.6;
        }

        .voltar {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #94a3b8;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <h1>Português - Pontuação e Sintaxe 📍</h1>

    <div id="container-questoes">
        <div class="punctuation-rules">
            <div class="rule-card"><b>Sujeito + Verbo</b>Proibido separar com uma única vírgula.</div>
            <div class="rule-card"><b>Vocativo</b>Sempre isolado por vírgula (Ex: Olá, João).</div>
            <div class="rule-card"><b>Aposto</b>Explicações no meio da frase pedem vírgulas.</div>
        </div>

        <p style="text-align:center; color:#64748b;">Organizando as ideias através dos sinais...</p>
    </div>

    <a class="voltar" href="portugues.html">⬅ Voltar</a>

    <script>
    function carregarQuestoes() {
        const container = document.getElementById("container-questoes");
        const banco = JSON.parse(localStorage.getItem("bancoQuestoes")) || [];
        
        // Filtra por materia: portugues e assunto: pontuacao
        const filtradas = banco.filter(q => q.materia === "portugues" && q.assunto === "pontuacao");
        const rulesHtml = document.querySelector(".punctuation-rules").outerHTML;
        
        if (filtradas.length === 0) {
            container.innerHTML = rulesHtml + "<p style='text-align:center; color:#94a3b8;'>Sua pontuação está impecável. Nenhuma questão encontrada.</p>";
            return;
        }

        container.innerHTML = rulesHtml; 

        filtradas.forEach((q, index) => {
            const div = document.createElement("div");
            div.className = "questao";

            div.innerHTML = `
                <p><b>${index + 1}.</b> ${q.pergunta}</p>
                <label><input type="radio" name="q${q.id}" value="a"> A) ${q.a}</label>
                <label><input type="radio" name="q${q.id}" value="b"> B) ${q.b}</label>
                <label><input type="radio" name="q${q.id}" value="c"> C) ${q.c}</label>
                <label><input type="radio" name="q${q.id}" value="d"> D) ${q.d}</label>
                
                <button onclick="verificar('${q.id}', '${q.correta}')">Validar Sinais</button>
                <p id="feedback-${q.id}" style="margin-top:10px; font-weight:bold;"></p>
                
                <div id="res-${q.id}" class="resolucao-box">
                    <b style="color:#22d3ee;">Análise de Pontuação:</b><br><br>
                    ${q.resolucao || "Verifique as relações sintáticas (sujeito, verbo, complementos) para aplicar os sinais corretamente."}
                </div>
            `;
            container.appendChild(div);
        });
    }

    function verificar(id, correta) {
        const selecionada = document.querySelector(`input[name="q${id}"]:checked`);
        const feedback = document.getElementById(`feedback-${id}`);
        const resBox = document.getElementById(`res-${id}`);

        if (!selecionada) {
            alert("Selecione uma opção para validar a pausa!");
            return;
        }

        const acertou = selecionada.value === correta;
        resBox.style.display = "block";

        if (acertou) {
            feedback.innerText = "✅ Correto! Pontuação em harmonia.";
            feedback.style.color = "#22d3ee";
        } else {
            feedback.innerText = `❌ Incorreto. O sinal adequado exigia a opção (${correta.toUpperCase()})`;
            feedback.style.color = "#f87171";
        }

        // Sistema de Progresso Mundo CAVEST
        let logado = localStorage.getItem("logado");
        if(logado){
            let usuario = JSON.parse(localStorage.getItem(logado));
            if(!usuario.questoesResolvidas) usuario.questoesResolvidas = [];
            
            if(!usuario.questoesResolvidas.includes(id)){
                usuario.respondidas = (usuario.respondidas || 0) + 1;
                if(acertou) usuario.acertos = (usuario.acertos || 0) + 1;
                usuario.questoesResolvidas.push(id);
                localStorage.setItem(logado, JSON.stringify(usuario));
            }
        }
    }

    window.onload = carregarQuestoes;
    </script>

</body>
</html>
