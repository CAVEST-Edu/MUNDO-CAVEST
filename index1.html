<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAVEST - Atualizações</title>
    <style>
        body {
            background: #0f172a; /* Fundo escuro do CAVEST */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .conteudo {
            text-align: center;
            max-width: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .moldura-foto {
            width: 200px; /* Ajuste o tamanho da foto aqui */
            height: 200px;
            border-radius: 50%; /* Foto redonda */
            overflow: hidden;
            border: 5px solid #38bdf8; /* Borda azul do CAVEST */
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.5); /* Efeito neon */
            margin-top: 30px;
        }
        .foto {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Faz a foto preencher o círculo */
        }
        .mensagem {
            font-size: 1.6rem;
            line-height: 1.4;
            color: #f3f4f6;
            margin-top: 10px;
            font-weight: bold;
        }
        .destaque {
            color: #38bdf8; /* Azul destaque */
        }
    </style>
</head>
<body>

<div class="conteudo">
    
    <div class="moldura-foto">
        <img src="foto_biu.jpg" alt="Grande Biu trabalhando" class="foto">
    </div>

    <p class="mensagem">
        <span class="destaque">Grande Biu (João de Física)</span> está trabalhando em atualizações altamente <span class="destaque">maliciosas</span>,<br>
        tente novamente mais tarde.
    </p>
    
</div>

</body>
</html>
