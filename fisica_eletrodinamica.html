<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <meta charset="UTF-8">
    <title>CAVEST - Eletrodinâmica</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #fbbf24; /* Amarelo elétrico */
            margin-bottom: 40px;
        }

        #container-questoes {
            max-width: 800px;
            margin: auto;
        }

        .questao {
            background: #1e293b;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
            border-left: 5px solid #fbbf24;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .formula-box {
            background: #451a03; /* Marrom/Laranja escuro */
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border-left: 5px solid #f59e0b;
            font-size: 0.95em;
            color: #fef3c7;
        }

        .img-questao {
            max-width: 100%;
            border-radius: 8px;
            margin: 15px 0;
            display: block;
        }

        label {
            display: block;
            background: #334155;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        label:hover {
            background: #475569;
        }

        button {
            background: #22c55e;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            color: white;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
        }

        button:hover {
            background: #16a34a;
        }

        .resolucao-box {
            margin-top: 15px;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed #fbbf24;
        }

        .voltar {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #94a3b8;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <h1>Física - Eletrodinâmica ⚡</h1>

    <div id="container-questoes">
        <div class="formula-box">
            <h3 style="margin-top:0; color:#fcd34d;">⚡ Fórmulas Poderosas</h3>
            <b>1ª Lei de Ohm:</b> $$V = R \cdot I$$ (Dica: Vuri)<br>
            <b>Potência Elétrica:</b> $$P = V \cdot I$$ (Dica: Piu)<br>
            <b>Energia Consumida:</b> $$E = P \cdot \Delta t$$
        </div>

        <p style="text-align:center; color:#94a3b8;">Ligando o circuito de questões...</p>
    </div>

    <a class="voltar" href="fisica.html">⬅ Voltar</a>

    <script>
    function carregarQuestoes() {
        const container = document.getElementById("container-questoes");
        const banco = JSON.parse(localStorage.getItem("bancoQuestoes")) || [];
        
        // Filtra por materia: fisica e assunto: eletrodinamica
        const filtradas = banco.filter(q => q.materia === "fisica" && q.assunto === "eletrodinamica");

        const formHtml = document.querySelector(".formula-box").outerHTML;
        
        if (filtradas.length === 0) {
            container.innerHTML = formHtml + "<p style='text-align:center; color:#94a3b8;'>Circuito aberto! Não há questões de Eletrodinâmica carregadas.</p>";
            return;
        }

        container.innerHTML = formHtml; 

        filtradas.forEach((q, index) => {
            const div = document.createElement("div");
            div.className = "questao";

            let imgHtml = q.imagem ? `<img src="${q.imagem}" class="img-questao">` : "";
            let resolucaoHtml = q.resolucao ? `
                <div id="res-${q.id}" style="display:none;" class="resolucao-box">
                    <p style="color:#fcd34d; font-weight:bold; margin-bottom:5px;">💡 Explicação do Circuito:</p>
                    <p style="font-size:14px; color:#cbd5e1;">${q.resolucao}</p>
                </div>` : "";

            div.innerHTML = `
                ${imgHtml}
                <p><b>${index + 1}.</b> ${q.pergunta}</p>
                <label><input type="radio" name="q${q.id}" value="a"> A) ${q.a}</label>
                <label><input type="radio" name="q${q.id}" value="b"> B) ${q.b}</label>
                <label><input type="radio" name="q${q.id}" value="c"> C) ${q.c}</label>
                <label><input type="radio" name="q${q.id}" value="d"> D) ${q.d}</label>
                
                <button onclick="verificar('${q.id}', '${q.correta}')">Responder</button>
                <p id="feedback-${q.id}" style="margin-top:10px; font-weight:bold;"></p>
                ${resolucaoHtml}
            `;
            container.appendChild(div);
        });
    }

    function verificar(id, correta) {
        const selecionada = document.querySelector(`input[name="q${id}"]:checked`);
        const feedback = document.getElementById(`feedback-${id}`);
        const resBox = document.getElementById(`res-${id}`);

        if (!selecionada) {
            alert("Feche o circuito escolhendo uma opção!");
            return;
        }

        const acertou = selecionada.value === correta;

        if (acertou) {
            feedback.innerText = "✅ Correto! Você está brilhando como um LED.";
            feedback.style.color = "#22c55e";
        } else {
            feedback.innerText = `❌ Houve um curto-circuito. A resposta certa era (${correta.toUpperCase()})`;
            feedback.style.color = "#ef4444";
        }

        if (resBox) resBox.style.display = "block";

        let logado = localStorage.getItem("logado");
        if(logado){
            let usuario = JSON.parse(localStorage.getItem(logado));
            if(!usuario.questoesResolvidas) usuario.questoesResolvidas = [];
            
            if(!usuario.questoesResolvidas.includes(id)){
                usuario.respondidas = (usuario.respondidas || 0) + 1;
                if(acertou) usuario.acertos = (usuario.acertos || 0) + 1;
                usuario.questoesResolvidas.push(id);
                localStorage.setItem(logado, JSON.stringify(usuario));
            }
        }
    }

    window.onload = carregarQuestoes;
    </script>

</body>
</html>
