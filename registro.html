<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Registro - CAVEST</title>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin: 0;
}
.container{
  background:#1e293b;
  padding:40px;
  border-radius:10px;
  width:350px; /* Aumentei um pouco a largura para caber melhor */
  text-align:center;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}
input, select{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:5px;
  background: white;
  color: #334155;
}
label {
  display: block;
  text-align: left;
  font-size: 14px;
  color: #94a3b8;
  margin-top: 5px;
}
button{
  padding:12px;
  width:100%;
  background:#38bdf8;
  border:none;
  border-radius:5px;
  cursor:pointer;
  font-weight: bold;
  color: #020617;
  margin-top: 10px;
}
button:hover {
  background: #0ea5e9;
}
</style>

</head>
<body>

<div class="container">
<h2>Registrar</h2>

<input type="text" id="nome" placeholder="Nome completo">
<input type="password" id="senha" placeholder="Crie uma senha">

<label for="cargo">Eu sou:</label>
<select id="cargo">
  <option value="aluno">Aluno(a)</option>
  <option value="professor">Professor(a)</option>
</select>

<button onclick="registrar()">Criar Conta</button>
<p style="margin-top: 15px; font-size: 13px; color: #94a3b8;">Já tem conta? <a href="login.html" style="color: #38bdf8; text-decoration: none;">Faça login</a></p>
</div>

<script>
function registrar(){
  let nome = document.getElementById("nome").value.trim()
  let senha = document.getElementById("senha").value.trim()
  let cargo = document.getElementById("cargo").value // Pega o valor do select

  if(!nome || !senha){
    alert("Preencha todos os campos!")
    return
  }

  // Checa se usuário já existe
  if(localStorage.getItem(nome)){
    alert("Este nome de usuário já está sendo usado!")
    return
  }

  // Cria objeto do usuário com a nova propriedade 'cargo'
  let usuario = {
    nome: nome,
    senha: senha,
    cargo: cargo, // Salva se é aluno ou professor
    respondidas: 0,
    acertos: 0
  }

  // Salva no localStorage usando o nome como chave
  localStorage.setItem(nome, JSON.stringify(usuario))

  alert("Conta de " + cargo + " criada com sucesso!")
  window.location.href="login.html"
}
</script>

</body>
</html>
