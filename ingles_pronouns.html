<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CAVEST - Pronouns & Articles</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: white;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #3b82f6;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #container-questoes {
            max-width: 850px;
            margin: auto;
        }

        .cheat-sheet {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border-left: 5px solid #3b82f6;
            font-size: 0.85em;
        }

        .cheat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .cheat-item {
            background: #0f172a;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #334155;
        }

        .questao {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border-bottom: 3px solid #3b82f6;
        }

        label {
            display: block;
            background: #334155;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        label:hover {
            background: #1e3a8a;
        }

        button {
            background: #3b82f6;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .resolucao-box {
            display: none;
            margin-top: 15px;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #3b82f6;
            line-height: 1.4;
        }

        .voltar {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #94a3b8;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <h1>English - Identity & Reference 👤🆔</h1>

    <div id="container-questoes">
        <div class="cheat-sheet">
            <h3 style="margin-top:0; color:#3b82f6;">📑 Quick Reference</h3>
            <div class="cheat-grid">
                <div class="cheat-item"><b>Articles:</b> A (cons.) / AN (vow.) / THE (spec.)</div>
                <div class="cheat-item"><b>Subject:</b> I, You, He, She, It, We, They</div>
                <div class="cheat-item"><b>Object:</b> Me, You, Him, Her, It, Us, Them</div>
            </div>
        </div>

        <p style="text-align:center; color:#64748b;">Mapeando referências gramaticais...</p>
    </div>

    <a class="voltar" href="ingles.html">⬅ Voltar</a>

    <script>
    function carregarQuestoes() {
        const container = document.getElementById("container-questoes");
        const banco = JSON.parse(localStorage.getItem("bancoQuestoes")) || [];
        
        // Filtra por materia: ingles e assunto: pronomes
        const filtradas = banco.filter(q => q.materia === "ingles" && q.assunto === "pronomes");

        const sheetHtml = document.querySelector(".cheat-sheet").outerHTML;
        
        if (filtradas.length === 0) {
            container.innerHTML = sheetHtml + "<p style='text-align:center; color:#94a3b8;'>No pronouns found. Update the bank!</p>";
            return;
        }

        container.innerHTML = sheetHtml; 

        filtradas.forEach((q, index) => {
            const div = document.createElement("div");
            div.className = "questao";

            div.innerHTML = `
                <p><b>${index + 1}.</b> ${q.pergunta}</p>
                <label><input type="radio" name="q${q.id}" value="a"> A) ${q.a}</label>
                <label><input type="radio" name="q${q.id}" value="b"> B) ${q.b}</label>
                <label><input type="radio" name="q${q.id}" value="c"> C) ${q.c}</label>
                <label><input type="radio" name="q${q.id}" value="d"> D) ${q.d}</label>
                
                <button onclick="verificar('${q.id}', '${q.correta}')">Identify Correct</button>
                <p id="feedback-${q.id}" style="margin-top:10px; font-weight:bold;"></p>
                
                <div id="res-${q.id}" class="resolucao-box">
                    <b style="color:#3b82f6;">Structural Analysis:</b><br><br>
                    ${q.resolucao || "Check who is the subject and who is the object in the sentence."}
                </div>
            `;
            container.appendChild(div);
        });
    }

    function verificar(id, correta) {
        const selecionada = document.querySelector(`input[name="q${id}"]:checked`);
        const feedback = document.getElementById(`feedback-${id}`);
        const resBox = document.getElementById(`res-${id}`);

        if (!selecionada) {
            alert("Choose a reference to proceed!");
            return;
        }

        const acertou = selecionada.value === correta;
        resBox.style.display = "block";

        if (acertou) {
            feedback.innerText = "✅ Correct! Clear reference established.";
            feedback.style.color = "#3b82f6";
        } else {
            feedback.innerText = `❌ Error. The correct option was (${correta.toUpperCase()})`;
            feedback.style.color = "#f87171";
        }

        // Sistema de Progresso Mundo CAVEST
        let logado = localStorage.getItem("logado");
        if(logado){
            let usuario = JSON.parse(localStorage.getItem(logado));
            if(!usuario.questoesResolvidas) usuario.questoesResolvidas = [];
            
            if(!usuario.questoesResolvidas.includes(id)){
                usuario.respondidas = (usuario.respondidas || 0) + 1;
                if(acertou) usuario.acertos = (usuario.acertos || 0) + 1;
                usuario.questoesResolvidas.push(id);
                localStorage.setItem(logado, JSON.stringify(usuario));
            }
        }
    }

    window.onload = carregarQuestoes;
    </script>

</body>
</html>
