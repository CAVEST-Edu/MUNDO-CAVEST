<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CAVEST - Vocabulario Temático</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #38bdf8;
            margin-bottom: 40px;
        }

        #container-questoes {
            max-width: 800px;
            margin: auto;
        }

        .questao {
            background: #1e293b;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
            border-left: 5px solid #059669;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .diccionario-verde {
            background: #064e3b;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
            border-left: 5px solid #10b981;
            font-size: 0.9em;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            color: #d1fae5;
        }

        .img-questao {
            max-width: 100%;
            border-radius: 8px;
            margin-bottom: 15px;
            display: block;
        }

        label {
            display: block;
            background: #334155;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        label:hover {
            background: #475569;
        }

        button {
            background: #10b981;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            color: white;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
            font-weight: bold;
        }

        button:hover {
            background: #059669;
        }

        .resolucao-box {
            margin-top: 15px;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed #10b981;
        }

        .voltar {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #94a3b8;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <h1>Español - Vocabulario Temático 🌍💬</h1>

    <div id="container-questoes">
        <div class="diccionario-verde">
            <div>📌 <b>Ahorrar:</b> Economizar / Poupar</div>
            <div>📌 <b>Basura:</b> Lixo</div>
            <div>📌 <b>Desarrollo:</b> Desenvolvimento</div>
            <div>📌 <b>Cajero:</b> Caixa (banco/loja)</div>
            <div>📌 <b>Soportar:</b> Aguentar (não é suportar de apoiar)</div>
            <div>📌 <b>Éxito:</b> Sucesso</div>
        </div>

        <p style="text-align:center; color:#94a3b8;">Traduciendo términos clave para el examen...</p>
    </div>

    <a class="voltar" href="espanhol.html">⬅ Voltar</a>

    <script>
    function carregarQuestoes() {
        const container = document.getElementById("container-questoes");
        const banco = JSON.parse(localStorage.getItem("bancoQuestoes")) || [];
        
        const filtradas = banco.filter(q => q.materia === "espanhol" && q.assunto === "vocabulario");

        const dicHtml = document.querySelector(".diccionario-verde").outerHTML;
        
        if (filtradas.length === 0) {
            container.innerHTML = dicHtml + "<p style='text-align:center; color:#94a3b8;'>Aún no hay ejercicios de vocabulario cargados.</p>";
            return;
        }

        container.innerHTML = dicHtml; 

        filtradas.forEach((q, index) => {
            const div = document.createElement("div");
            div.className = "questao";

            let imgHtml = q.imagem ? `<img src="${q.imagem}" class="img-questao">` : "";
            let resolucaoHtml = q.resolucao ? `
                <div id="res-${q.id}" style="display:none;" class="resolucao-box">
                    <p style="color:#10b981; font-weight:bold; margin-bottom:5px;">💡 Contexto Semántico:</p>
                    <p style="font-size:14px; color:#cbd5e1;">${q.resolucao}</p>
                </div>` : "";

            div.innerHTML = `
                ${imgHtml}
                <p><b>${index + 1}.</b> ${q.pergunta}</p>
                <label><input type="radio" name="q${q.id}" value="a"> A) ${q.a}</label>
                <label><input type="radio" name="q${q.id}" value="b"> B) ${q.b}</label>
                <label><input type="radio" name="q${q.id}" value="c"> C) ${q.c}</label>
                <label><input type="radio" name="q${q.id}" value="d"> D) ${q.d}</label>
                
                <button onclick="verificar('${q.id}', '${q.correta}')">Responder</button>
                <p id="feedback-${q.id}" style="margin-top:10px; font-weight:bold;"></p>
                ${resolucaoHtml}
            `;
            container.appendChild(div);
        });
    }

    function verificar(id, correta) {
        const selecionada = document.querySelector(`input[name="q${id}"]:checked`);
        const feedback = document.getElementById(`feedback-${id}`);
        const resBox = document.getElementById(`res-${id}`);

        if (!selecionada) {
            alert("¡Elige una opción!");
            return;
        }

        const acertou = selecionada.value === correta;

        if (acertou) {
            feedback.innerText = "✅ ¡Correcto! Tu vocabulario es excelente.";
            feedback.style.color = "#22c55e";
        } else {
            feedback.innerText = `❌ ¡Casi! La palabra correcta era la (${correta.toUpperCase()})`;
            feedback.style.color = "#ef4444";
        }

        if (resBox) resBox.style.display = "block";

        let logado = localStorage.getItem("logado");
        if(logado){
            let usuario = JSON.parse(localStorage.getItem(logado));
            if(!usuario.questoesResolvidas) usuario.questoesResolvidas = [];
            
            if(!usuario.questoesResolvidas.includes(id)){
                usuario.respondidas = (usuario.respondidas || 0) + 1;
                if(acertou) usuario.acertos = (usuario.acertos || 0) + 1;
                usuario.questoesResolvidas.push(id);
                localStorage.setItem(logado, JSON.stringify(usuario));
            }
        }
    }

    window.onload = carregarQuestoes;
    </script>

</body>
</html>
