<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CAVEST - Estequiometria</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: white;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #22d3ee; /* Cyan */
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #container-questoes {
            max-width: 850px;
            margin: auto;
        }

        /* Tabela de Conversão Rápida Mundo CAVEST */
        .stoich-header {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border-bottom: 4px solid #22d3ee;
            display: flex;
            justify-content: space-around;
            font-size: 0.9em;
        }

        .unit-pill {
            background: #0f172a;
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid #334155;
        }

        .unit-pill b { color: #22d3ee; }

        .questao {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            border-left: 5px solid #22d3ee;
        }

        label {
            display: block;
            background: #334155;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        label:hover {
            background: #164e63; /* Cyan-900 */
        }

        button {
            background: #22d3ee;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: #67e8f9;
            transform: translateY(-2px);
        }

        .resolucao-box {
            display: none;
            margin-top: 15px;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #22d3ee;
            line-height: 1.6;
            font-size: 0.95em;
        }

        .voltar {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #94a3b8;
            text-decoration: none;
        }

        .voltar:hover { color: #22d3ee; }
    </style>
</head>

<body>

    <h1>Química - Estequiometria ⚖️</h1>

    <div id="container-questoes">
        <div class="stoich-header">
            <div class="unit-pill">1 mol = <b>Massa Molar (g)</b></div>
            <div class="unit-pill">1 mol = <b>6,02 x 10²³ partículas</b></div>
            <div class="unit-pill">1 mol (CNTP) = <b>22,4 L</b></div>
        </div>

        <p style="text-align:center; color:#64748b; margin-bottom: 20px;">Calculando as proporções da matéria...</p>
    </div>

     <a class="voltar" href="quimica.html">⬅ Voltar</a>

    <script>
    function carregarQuestoes() {
        const container = document.getElementById("container-questoes");
        const banco = JSON.parse(localStorage.getItem("bancoQuestoes")) || [];
        
        // Filtra por materia: quimica e assunto: estequiometria
        const filtradas = banco.filter(q => q.materia === "quimica" && q.assunto === "estequiometria");
        const headerHtml = document.querySelector(".stoich-header").outerHTML;
        
        if (filtradas.length === 0) {
            container.innerHTML = headerHtml + "<p style='text-align:center; color:#94a3b8;'>Balança equilibrada. Nenhuma questão de estequiometria no banco.</p>";
            return;
        }

        container.innerHTML = headerHtml; 

        filtradas.forEach((q, index) => {
            const div = document.createElement("div");
            div.className = "questao";

            div.innerHTML = `
                <p><b>${index + 1}.</b> ${q.pergunta}</p>
                <label><input type="radio" name="q${q.id}" value="a"> A) ${q.a}</label>
                <label><input type="radio" name="q${q.id}" value="b"> B) ${q.b}</label>
                <label><input type="radio" name="q${q.id}" value="c"> C) ${q.c}</label>
                <label><input type="radio" name="q${q.id}" value="d"> D) ${q.d}</label>
                
                <button onclick="verificar('${q.id}', '${q.correta}')">Calcular Proporção</button>
                <p id="feedback-${q.id}" style="margin-top:10px; font-weight:bold;"></p>
                
                <div id="res-${q.id}" class="resolucao-box">
                    <b style="color:#22d3ee;">Cálculo Estequiométrico:</b><br><br>
                    ${q.resolucao || "1. Ajuste a equação | 2. Relacione os mols | 3. Converta para a unidade pedida."}
                </div>
            `;
            container.appendChild(div);
        });
    }

    function verificar(id, correta) {
        const selecionada = document.querySelector(`input[name="q${id}"]:checked`);
        const feedback = document.getElementById(`feedback-${id}`);
        const resBox = document.getElementById(`res-${id}`);

        if (!selecionada) {
            alert("Faça o balanceamento da sua escolha primeiro!");
            return;
        }

        const acertou = selecionada.value === correta;
        resBox.style.display = "block";

        if (acertou) {
            feedback.innerText = "✅ Correto! Massa e mol em perfeito equilíbrio.";
            feedback.style.color = "#22d3ee";
        } else {
            feedback.innerText = `❌ Incorreto. O resultado estequiométrico é a opção (${correta.toUpperCase()})`;
            feedback.style.color = "#f87171";
        }

        // Sistema de Progresso Mundo CAVEST
        let logado = localStorage.getItem("logado");
        if(logado){
            let usuario = JSON.parse(localStorage.getItem(logado));
            if(!usuario.questoesResolvidas) usuario.questoesResolvidas = [];
            
            if(!usuario.questoesResolvidas.includes(id)){
                usuario.respondidas = (usuario.respondidas || 0) + 1;
                if(acertou) usuario.acertos = (usuario.acertos || 0) + 1;
                usuario.questoesResolvidas.push(id);
                localStorage.setItem(logado, JSON.stringify(usuario));
            }
        }
    }

    window.onload = carregarQuestoes;
    </script>

</body>
</html>
