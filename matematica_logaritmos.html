<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CAVEST - Logaritmos</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: white;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #ec4899; /* Pink/Magenta */
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #container-questoes {
            max-width: 850px;
            margin: auto;
        }

        .log-rules {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border-bottom: 5px solid #ec4899;
            display: flex;
            justify-content: space-around;
            font-size: 0.8em;
        }

        .rule-card {
            background: #0f172a;
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #334155;
        }

        .rule-card b { color: #ec4899; }

        .questao {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
            border-left: 5px solid #ec4899;
        }

        label {
            display: block;
            background: #334155;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s ease-in-out;
        }

        label:hover {
            background: #701a75; /* Purple/Magenta mix */
            transform: scale(1.01);
        }

        button {
            background: #ec4899;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: #f472b6;
            box-shadow: 0 0 20px rgba(236, 72, 153, 0.5);
        }

        .resolucao-box {
            display: none;
            margin-top: 15px;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid #ec4899;
            line-height: 1.6;
        }

        .voltar {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #94a3b8;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <h1>Matemática - Escalas Logarítmicas 📉</h1>

    <div id="container-questoes">
        <div class="log-rules">
            <div class="rule-card"><b>Produto:</b> log(a.b) = log a + log b</div>
            <div class="rule-card"><b>Quociente:</b> log(a/b) = log a - log b</div>
            <div class="rule-card"><b>Potência:</b> log aⁿ = n.log a</div>
        </div>

        <p style="text-align:center; color:#64748b;">Descomplicando expoentes invisíveis...</p>
    </div>

    <a class="voltar" href="matematica.html">⬅ Voltar</a>

    <script>
    function carregarQuestoes() {
        const container = document.getElementById("container-questoes");
        const banco = JSON.parse(localStorage.getItem("bancoQuestoes")) || [];
        
        // Filtra por materia: matematica e assunto: logaritmos
        const filtradas = banco.filter(q => q.materia === "matematica" && q.assunto === "logaritmos");
        const rulesHtml = document.querySelector(".log-rules").outerHTML;
        
        if (filtradas.length === 0) {
            container.innerHTML = rulesHtml + "<p style='text-align:center; color:#94a3b8;'>Nenhum logaritmo encontrado no banco de dados.</p>";
            return;
        }

        container.innerHTML = rulesHtml; 

        filtradas.forEach((q, index) => {
            const div = document.createElement("div");
            div.className = "questao";

            div.innerHTML = `
                <p><b>${index + 1}.</b> ${q.pergunta}</p>
                <label><input type="radio" name="q${q.id}" value="a"> A) ${q.a}</label>
                <label><input type="radio" name="q${q.id}" value="b"> B) ${q.b}</label>
                <label><input type="radio" name="q${q.id}" value="c"> C) ${q.c}</label>
                <label><input type="radio" name="q${q.id}" value="d"> D) ${q.d}</label>
                
                <button onclick="verificar('${q.id}', '${q.correta}')">Resolver Log</button>
                <p id="feedback-${q.id}" style="margin-top:10px; font-weight:bold;"></p>
                
                <div id="res-${q.id}" class="resolucao-box">
                    <b style="color:#ec4899;">Aplicação da Definição:</b><br><br>
                    ${q.resolucao || "Lembre-se: log na base B de A é o expoente que elevamos B para dar A."}
                </div>
            `;
            container.appendChild(div);
        });
    }

    function verificar(id, correta) {
        const selecionada = document.querySelector(`input[name="q${id}"]:checked`);
        const feedback = document.getElementById(`feedback-${id}`);
        const resBox = document.getElementById(`res-${id}`);

        if (!selecionada) {
            alert("Aplique a definição antes de responder!");
            return;
        }

        const acertou = selecionada.value === correta;
        resBox.style.display = "block";

        if (acertou) {
            feedback.innerText = "✅ Correto! Expoente encontrado com precisão.";
            feedback.style.color = "#ec4899";
        } else {
            feedback.innerText = `❌ Incorreto. O valor logarítmico era (${correta.toUpperCase()})`;
            feedback.style.color = "#f87171";
        }

        // Progresso Mundo CAVEST
        let logado = localStorage.getItem("logado");
        if(logado){
            let usuario = JSON.parse(localStorage.getItem(logado));
            if(!usuario.questoesResolvidas) usuario.questoesResolvidas = [];
            
            if(!usuario.questoesResolvidas.includes(id)){
                usuario.respondidas = (usuario.respondidas || 0) + 1;
                if(acertou) usuario.acertos = (usuario.acertos || 0) + 1;
                usuario.questoesResolvidas.push(id);
                localStorage.setItem(logado, JSON.stringify(usuario));
            }
        }
    }

    window.onload = carregarQuestoes;
    </script>

</body>
</html>
