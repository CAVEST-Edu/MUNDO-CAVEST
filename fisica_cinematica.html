<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>CAVEST - Cinemática</title>

<style>
body{
    font-family:Arial;
    background:#0f172a;
    color:white;
    padding:40px;
}

h1{
    text-align:center;
    margin-bottom: 40px;
    color: #38bdf8;
}

/* O container onde as questões do banco vão cair */
#container-questoes {
    max-width: 800px;
    margin: auto;
}

/* Estilo dos cards que o motor vai criar */
.questao{
    background:#1e293b;
    padding:25px;
    border-radius:15px;
    margin-bottom:25px;
    border-left: 5px solid #22c55e;
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

.img-questao {
    max-width: 100%;
    border-radius: 8px;
    margin-bottom: 15px;
    display: block;
}

label {
    display: block;
    background: #334155;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

label:hover {
    background: #475569;
}

button {
    background:#22c55e;
    border:none;
    padding:12px 25px;
    border-radius:6px;
    color:white;
    font-weight: bold;
    cursor:pointer;
    margin-top:15px;
}

.resolucao-box {
    margin-top:20px;
    background:#0f172a;
    padding:15px;
    border-radius:8px;
    border: 1px dashed #facc15;
}

.voltar {
    display: block;
    text-align: center;
    margin-top: 30px;
    color: #94a3b8;
    text-decoration: none;
}
</style>
</head>

<body>

<h1>Física - Cinemática</h1>

<div id="container-questoes">
    <p style="text-align:center; color:#94a3b8;">Carregando desafios...</p>
</div>

<a href="fisica.html" class="voltar">⬅ Voltar para Física</a>

<script src="motor-questoes.js"></script>

<script>
// Quando a página abrir, o motor busca as questões de FISICA do assunto CINEMATICA
window.onload = function() {
    // Certifique-se que o nome "cinematica" é igual ao que o painel gera
    carregarQuestoes("fisica", "cinematica");
};

// Se você não criou o arquivo externo 'motor-questoes.js' ainda, 
// a função carregarQuestoes deve estar aqui embaixo:

function carregarQuestoes(materia, assunto) {
    const container = document.getElementById("container-questoes");
    const banco = JSON.parse(localStorage.getItem("bancoQuestoes")) || [];
    
    // Filtra as questões
    const filtradas = banco.filter(q => q.materia === materia && q.assunto === assunto);

    if (filtradas.length === 0) {
        container.innerHTML = "<p style='text-align:center;'>Nenhuma questão encontrada para este tema.</p>";
        return;
    }

    container.innerHTML = ""; // Limpa o "Carregando..."

    filtradas.forEach((q, index) => {
        const div = document.createElement("div");
        div.className = "questao";

        let imgHtml = q.imagem ? `<img src="${q.imagem}" class="img-questao">` : "";
        let resolucaoHtml = q.resolucao ? `
            <div id="res-${q.id}" style="display:none;" class="resolucao-box">
                <p style="color:#facc15; font-weight:bold;">💡 Resolução Comentada:</p>
                <p>${q.resolucao}</p>
            </div>` : "";

        div.innerHTML = `
            ${imgHtml}
            <p><b>Questão ${index + 1}:</b> ${q.pergunta}</p>
            <label><input type="radio" name="q${q.id}" value="a"> A) ${q.a}</label>
            <label><input type="radio" name="q${q.id}" value="b"> B) ${q.b}</label>
            <label><input type="radio" name="q${q.id}" value="c"> C) ${q.c}</label>
            <label><input type="radio" name="q${q.id}" value="d"> D) ${q.d}</label>
            
            <button onclick="verificar('${q.id}', '${q.correta}')">Responder</button>
            <p id="feedback-${q.id}" style="margin-top:10px; font-weight:bold;"></p>
            ${resolucaoHtml}
        `;
        container.appendChild(div);
    });
}

function verificar(id, correta) {
    const sel = document.querySelector(`input[name="q${id}"]:checked`);
    const feedback = document.getElementById(`feedback-${id}`);
    const resBox = document.getElementById(`res-${id}`);

    if (!sel) return alert("Escolha uma opção!");

    if (sel.value === correta) {
        feedback.innerHTML = "✅ Você acertou!";
        feedback.style.color = "#22c55e";
    } else {
        feedback.innerHTML = `❌ Errado. A correta é (${correta.toUpperCase()})`;
        feedback.style.color = "#ef4444";
    }

    if (resBox) resBox.style.display = "block";
    
    // Opcional: Chamar sua função de somar progresso aqui
}
</script>

</body>
</html>
