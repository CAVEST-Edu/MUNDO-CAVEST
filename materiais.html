<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Materiais - Mundo CAVEST</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: #0f172a; 
            color: white; 
            text-align: center; 
            margin: 0;
            padding: 20px;
        }

        h1 { 
            margin-top: 40px; 
            color: #38bdf8;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Botão de Atalho para o Professor */
        #btnAdmin {
            display: none;
            background: #1e3a8a;
            color: #38bdf8;
            border: 1px solid #38bdf8;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            margin-bottom: 30px;
            transition: 0.3s;
        }

        #btnAdmin:hover {
            background: #38bdf8;
            color: #0f172a;
        }

        .container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 20px; 
            max-width: 1000px; 
            margin: 40px auto; 
        }

        .card { 
            background: #1e293b; 
            padding: 40px 20px; 
            border-radius: 12px; 
            border-bottom: 4px solid #334155;
            transition: 0.3s ease-in-out; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card:hover { 
            background: #1e3a8a; 
            transform: translateY(-5px);
            border-bottom-color: #38bdf8;
        }

        .card a { 
            text-decoration: none; 
            color: white; 
            font-size: 20px; 
            font-weight: bold; 
            width: 100%;
            height: 100%;
        }

        .voltar { 
            margin-top: 40px; 
            display: inline-block; 
            color: #94a3b8; 
            text-decoration: none; 
            font-size: 14px;
        }

        .voltar:hover { color: white; }
    </style>
</head>
<body>

    <h1>📚 Biblioteca de Materiais</h1>

    <a href="painel-professor.html" id="btnAdmin">⚙️ IR PARA PAINEL DE CONTROLE</a>

    <div class="container">
        <div class="card"><a href="materiais_fisica.html">🧪 Física</a></div>
        <div class="card"><a href="materiais_quimica.html">⚗️ Química</a></div>
        <div class="card"><a href="materiais_biologia.html">🧬 Biologia</a></div>
        <div class="card"><a href="materiais_matematica.html">📐 Matemática</a></div>
        <div class="card"><a href="materiais_historia.html">📜 História</a></div>
        <div class="card"><a href="materiais_geografia.html">🌍 Geografia</a></div>
        <div class="card"><a href="materiais_portugues.html">✍️ Português</a></div>
    </div>

    <a class="voltar" href="index.html">⬅ Voltar para o Início</a>

    <script>
        // Verifica se é professor para mostrar o botão de atalho
        const usuario = JSON.parse(localStorage.getItem("usuarioAtual")) || { cargo: "aluno" };
        
        if (usuario.cargo === "professor") {
            document.getElementById("btnAdmin").style.display = "inline-block";
        }
    </script>
</body>
</html>
