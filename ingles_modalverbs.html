<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CAVEST - Modal Verbs</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: white;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #10b981; /* Emerald */
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #container-questoes {
            max-width: 800px;
            margin: auto;
        }

        .modal-guide {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border-bottom: 4px solid #10b981;
        }

        .modal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .modal-item {
            background: #334155;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85em;
            text-align: center;
        }

        .modal-item b {
            color: #10b981;
            display: block;
        }

        .questao {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-left: 5px solid #10b981;
        }

        label {
            display: block;
            background: #334155;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        label:hover {
            background: #065f46;
        }

        button {
            background: #10b981;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #34d399;
        }

        .resolucao-box {
            display: none;
            margin-top: 15px;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #10b981;
            font-size: 0.9em;
            color: #cbd5e1;
        }

        .voltar {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #94a3b8;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <h1>English - Modal Verbs 💡</h1>

    <div id="container-questoes">
        <div class="modal-guide">
            <h3 style="margin:0;">🛠️ Modal Express Toolbox</h3>
            <div class="modal-grid">
                <div class="modal-item"><b>SHOULD</b> Advice / Suggestion</div>
                <div class="modal-item"><b>MUST</b> Obligation / Deduction</div>
                <div class="modal-item"><b>CAN / MAY</b> Permission / Ability</div>
                <div class="modal-item"><b>MIGHT / COULD</b> Possibility</div>
            </div>
        </div>

        <p style="text-align:center; color:#64748b;">Ajustando tons de intenção...</p>
    </div>

    <a class="voltar" href="ingles.html">⬅ Voltar</a>

    <script>
    function carregarQuestoes() {
        const container = document.getElementById("container-questoes");
        const banco = JSON.parse(localStorage.getItem("bancoQuestoes")) || [];
        
        // Filtra por materia: ingles e assunto: modais
        const filtradas = banco.filter(q => q.materia === "ingles" && q.assunto === "modais");

        const guideHtml = document.querySelector(".modal-guide").outerHTML;
        
        if (filtradas.length === 0) {
            container.innerHTML = guideHtml + "<p style='text-align:center; color:#94a3b8;'>No modals found. Add some to the database!</p>";
            return;
        }

        container.innerHTML = guideHtml; 

        filtradas.forEach((q, index) => {
            const div = document.createElement("div");
            div.className = "questao";

            div.innerHTML = `
                <p><b>${index + 1}.</b> ${q.pergunta}</p>
                <label><input type="radio" name="q${q.id}" value="a"> A) ${q.a}</label>
                <label><input type="radio" name="q${q.id}" value="b"> B) ${q.b}</label>
                <label><input type="radio" name="q${q.id}" value="c"> C) ${q.c}</label>
                <label><input type="radio" name="q${q.id}" value="d"> D) ${q.d}</label>
                
                <button onclick="verificar('${q.id}', '${q.correta}')">Analyze Intent</button>
                <p id="feedback-${q.id}" style="margin-top:10px; font-weight:bold;"></p>
                
                <div id="res-${q.id}" class="resolucao-box">
                    <b style="color:#10b981;">Grammar Focus:</b><br><br>
                    ${q.resolucao || "Check the modal's function in context."}
                </div>
            `;
            container.appendChild(div);
        });
    }

    function verificar(id, correta) {
        const selecionada = document.querySelector(`input[name="q${id}"]:checked`);
        const feedback = document.getElementById(`feedback-${id}`);
        const resBox = document.getElementById(`res-${id}`);

        if (!selecionada) {
            alert("Choose a modal to continue!");
            return;
        }

        const acertou = selecionada.value === correta;
        resBox.style.display = "block";

        if (acertou) {
            feedback.innerText = "✅ Correct! Intent perfectly understood.";
            feedback.style.color = "#10b981";
        } else {
            feedback.innerText = `❌ Incorrect. The correct modal was (${correta.toUpperCase()})`;
            feedback.style.color = "#f87171";
        }

        // Sistema de Progresso
        let logado = localStorage.getItem("logado");
        if(logado){
            let usuario = JSON.parse(localStorage.getItem(logado));
            if(!usuario.questoesResolvidas) usuario.questoesResolvidas = [];
            
            if(!usuario.questoesResolvidas.includes(id)){
                usuario.respondidas = (usuario.respondidas || 0) + 1;
                if(acertou) usuario.acertos = (usuario.acertos || 0) + 1;
                usuario.questoesResolvidas.push(id);
                localStorage.setItem(logado, JSON.stringify(usuario));
            }
        }
    }

    window.onload = carregarQuestoes;
    </script>

</body>
</html>
