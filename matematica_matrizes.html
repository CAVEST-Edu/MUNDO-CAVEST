<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CAVEST - Matrizes</title>

    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: white;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #6366f1; /* Indigo */
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #container-questoes {
            max-width: 850px;
            margin: auto;
        }

        .matrix-guide {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border-top: 5px solid #6366f1;
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-size: 0.9em;
        }

        .guide-box {
            text-align: center;
            background: #0f172a;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #334155;
        }

        .guide-box b { color: #6366f1; }

        .questao {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            border-left: 5px solid #6366f1;
        }

        label {
            display: block;
            background: #334155;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        label:hover {
            background: #312e81; /* Indigo-900 */
        }

        button {
            background: #6366f1;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: #818cf8;
            transform: scale(1.05);
        }

        .resolucao-box {
            display: none;
            margin-top: 15px;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed #6366f1;
            line-height: 1.6;
        }

        .voltar {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #94a3b8;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <h1>Matemática - Álgebra Linear: Matrizes 🧮</h1>

    <div id="container-questoes">
        <div class="matrix-guide">
            <div class="guide-box">
                <b>Dimensão</b><br>
                Linhas (m) × Colunas (n)
            </div>
            <div class="guide-box">
                <b>Endereço</b><br>
                a<sub>ij</sub> (i=linha, j=coluna)
            </div>
            <div class="guide-box">
                <b>Operação</b><br>
                Soma: Elemento por Elemento
            </div>
        </div>

        <p style="text-align:center; color:#64748b;">Organizando dados em grades estruturadas...</p>
    </div>

    <a class="voltar" href="matematica.html">⬅ Voltar</a>

    <script>
    function carregarQuestoes() {
        const container = document.getElementById("container-questoes");
        const banco = JSON.parse(localStorage.getItem("bancoQuestoes")) || [];
        
        // Filtra por materia: matematica e assunto: matrizes
        const filtradas = banco.filter(q => q.materia === "matematica" && q.assunto === "matrizes");
        const guideHtml = document.querySelector(".matrix-guide").outerHTML;
        
        if (filtradas.length === 0) {
            container.innerHTML = guideHtml + "<p style='text-align:center; color:#94a3b8;'>Nenhuma matriz detectada no banco de dados.</p>";
            return;
        }

        container.innerHTML = guideHtml; 

        filtradas.forEach((q, index) => {
            const div = document.createElement("div");
            div.className = "questao";

            div.innerHTML = `
                <p><b>${index + 1}.</b> ${q.pergunta}</p>
                <label><input type="radio" name="q${q.id}" value="a"> A) ${q.a}</label>
                <label><input type="radio" name="q${q.id}" value="b"> B) ${q.b}</label>
                <label><input type="radio" name="q${q.id}" value="c"> C) ${q.c}</label>
                <label><input type="radio" name="q${q.id}" value="d"> D) ${q.d}</label>
                
                <button onclick="verificar('${q.id}', '${q.correta}')">Processar Matriz</button>
                <p id="feedback-${q.id}" style="margin-top:10px; font-weight:bold;"></p>
                
                <div id="res-${q.id}" class="resolucao-box">
                    <b style="color:#6366f1;">Análise Estrutural:</b><br><br>
                    ${q.resolucao || "Verifique a posição dos elementos (i, j) para encontrar a solução."}
                </div>
            `;
            container.appendChild(div);
        });
        
        // Re-renderiza o MathJax para as novas questões inseridas
        if (window.MathJax) {
            MathJax.typeset();
        }
    }

    function verificar(id, correta) {
        const selecionada = document.querySelector(`input[name="q${id}"]:checked`);
        const feedback = document.getElementById(`feedback-${id}`);
        const resBox = document.getElementById(`res-${id}`);

        if (!selecionada) {
            alert("Localize o elemento ou dimensão primeiro!");
            return;
        }

        const acertou = selecionada.value === correta;
        resBox.style.display = "block";

        if (acertou) {
            feedback.innerText = "✅ Correto! Coordenadas exatas.";
            feedback.style.color = "#6366f1";
        } else {
            feedback.innerText = `❌ Incorreto. A configuração correta era (${correta.toUpperCase()})`;
            feedback.style.color = "#f87171";
        }

        // Sistema de Progresso Mundo CAVEST
        let logado = localStorage.getItem("logado");
        if(logado){
            let usuario = JSON.parse(localStorage.getItem(logado));
            if(!usuario.questoesResolvidas) usuario.questoesResolvidas = [];
            
            if(!usuario.questoesResolvidas.includes(id)){
                usuario.respondidas = (usuario.respondidas || 0) + 1;
                if(acertou) usuario.acertos = (usuario.acertos || 0) + 1;
                usuario.questoesResolvidas.push(id);
                localStorage.setItem(logado, JSON.stringify(usuario));
            }
        }
    }

    window.onload = carregarQuestoes;
    </script>

</body>
</html>
