<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CAVEST - Redação Profissional</title>
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f172a;
            color: white;
            padding: 40px;
            max-width: 900px;
            margin: auto;
        }

        .tema-box {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            border-left: 5px solid #38bdf8;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tema-info h2 { font-size: 14px; color: #38bdf8; text-transform: uppercase; margin: 0; }
        .tema-info p { font-size: 18px; font-weight: bold; margin: 5px 0 0 0; }

        textarea {
            width: 100%; height: 250px; padding: 15px;
            border-radius: 8px; border: none; font-size: 16px;
            background: #f8fafc; color: #1e293b; margin-bottom: 10px;
            resize: vertical;
        }

        .botoes-container { display: flex; gap: 10px; flex-wrap: wrap; }

        button {
            padding: 12px 25px; border: none; border-radius: 6px;
            font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }

        #btnSortear { background: #38bdf8; color: #0f172a; font-size: 14px; padding: 8px 15px; }
        #btnSortear:hover { background: #7dd3fc; }

        #btnCorrigir { background: #22c55e; color: white; }
        #btnCorrigir:hover { background: #16a34a; }
        #btnCorrigir:disabled { background: #64748b; cursor: not-allowed; }

        #btnPDF { 
            background: #ef4444; color: white; display: none;
        }
        #btnPDF:hover { background: #dc2626; }

        #resultado {
            margin-top: 20px; background: #1e293b; padding: 25px;
            border-radius: 10px; line-height: 1.6; border-left: 5px solid #22c55e;
            display: none; color: #f1f5f9;
        }

        #resultado h1, #resultado h2, #resultado h3 { color: #22c55e; margin-top: 20px; }
        #resultado hr { border: 0; border-top: 1px solid #334155; margin: 20px 0; }

        .xp-banner {
            background: rgba(234, 179, 8, 0.15);
            border: 1px solid #eab308;
            color: #eab308;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
            font-weight: bold;
            text-align: center;
            animation: bounceIn 0.5s ease;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.8); opacity: 0; }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        .voltar { display: inline-block; text-decoration: none; color: #94a3b8; margin-top: 30px; }
    </style>
</head>

<body>

    <h1>📝 Corretor de Redação ENEM</h1>
    
    <div class="tema-box">
        <div class="tema-info">
            <h2>Tema Proposto:</h2>
            <p id="temaAtual">A importância da educação ambiental no Brasil</p>
        </div>
        <button id="btnSortear" onclick="gerarTema()">🎲 Sortear Tema</button>
    </div>

    <div id="xpGanhos" class="xp-banner">✨ +500 XP por praticar redação!</div>

    <textarea id="redacao" placeholder="Cole sua redação aqui (mínimo 100 caracteres)..."></textarea>

    <div class="botoes-container">
        <button id="btnCorrigir" onclick="corrigirRedacao()">Corrigir com IA</button>
        <button id="btnPDF" onclick="baixarPDF()">📥 Baixar Correção em PDF</button>
    </div>

    <div id="resultado"></div>

    <a href="index.html" class="voltar">⬅ Voltar para o Início</a>

    <script>
        const temasEnem = [
            "Os impactos da inteligência artificial na educação brasileira",
            "A persistência da violência contra a mulher na sociedade",
            "Caminhos para combater a intolerância religiosa no Brasil",
            "Desafios para a valorização de comunidades e povos tradicionais",
            "Invisibilidade e registro civil: garantia de acesso à cidadania",
            "A manipulação do comportamento do usuário pelo controle de dados",
            "Desafios para a formação educacional de surdos no Brasil",
            "Efeitos da escassez de água e a gestão de recursos hídricos",
            "O estigma associado às doenças mentais na sociedade brasileira",
            "A democratização do acesso ao cinema no Brasil"
        ];

        function gerarTema() {
            const index = Math.floor(Math.random() * temasEnem.length);
            document.getElementById("temaAtual").innerText = temasEnem[index];
            document.getElementById("resultado").style.display = "none";
            document.getElementById("btnPDF").style.display = "none";
            document.getElementById("xpGanhos").style.display = "none";
            document.getElementById("redacao").value = "";
        }

        async function corrigirRedacao() {
            let texto = document.getElementById("redacao").value;
            let tema = document.getElementById("temaAtual").innerText;
            let divResultado = document.getElementById("resultado");
            let btnC = document.getElementById("btnCorrigir");
            let btnP = document.getElementById("btnPDF");
            let xpBanner = document.getElementById("xpGanhos");

            if (texto.trim().length < 100) {
                alert("Sua redação está muito curta! Escreva pelo menos 100 caracteres.");
                return;
            }

            btnC.innerText = "Analisando... (pode levar 40s)";
            btnC.disabled = true;
            btnP.style.display = "none";
            xpBanner.style.display = "none";
            
            divResultado.style.display = "block";
            divResultado.innerHTML = "<em>Conectando ao servidor e gerando correção...</em>";

            // LINK DO SEU SERVIDOR NO RENDER
            const API_URL = "https://mundo-cavest.onrender.com/corrigir";

            try {
                let resposta = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        redacao: texto,
                        tema: tema 
                    })
                });

                if (!resposta.ok) throw new Error("Erro no servidor");

                let dados = await resposta.json();
                
                // Converte o Markdown da IA para HTML
                divResultado.innerHTML = marked.parse(dados.resposta);
                btnP.style.display = "inline-block";
                
                adicionarXP(500);
                xpBanner.style.display = "block";

            } catch (erro) {
                divResultado.innerHTML = "❌ **Erro de conexão.**<br><br>O servidor pode estar 'acordando' (instância gratuita do Render). <br><strong>Aguarde 20 segundos e tente clicar no botão novamente.</strong>";
                console.error("Erro detalhado:", erro);
            } finally {
                btnC.innerText = "Corrigir com IA";
                btnC.disabled = false;
            }
        }

        function adicionarXP(quantidade) {
            const nomeLogado = localStorage.getItem("logado");
            if (nomeLogado) {
                let usuario = JSON.parse(localStorage.getItem(nomeLogado)) || {};
                usuario.xp = (usuario.xp || 0) + quantidade;
                localStorage.setItem(nomeLogado, JSON.stringify(usuario));
            }
        }

        function baixarPDF() {
            const elemento = document.getElementById('resultado');
            const options = {
                margin: 10,
                filename: 'Correcao_Mundo_CAVEST.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, logging: false, backgroundColor: '#ffffff' },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // Ajuste temporário para o PDF sair com fundo branco e letra preta
            const corOriginal = elemento.style.color;
            const bgOriginal = elemento.style.background;
            elemento.style.color = "black";
            elemento.style.background = "white";

            html2pdf().set(options).from(elemento).save().then(() => {
                elemento.style.color = corOriginal;
                elemento.style.background = bgOriginal;
            });
        }
    </script>

</body>
</html>
