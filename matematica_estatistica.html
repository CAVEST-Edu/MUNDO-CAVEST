<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CAVEST - Estatística</title>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f172a;
            color: white;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #22d3ee; /* Cyan */
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #container-questoes {
            max-width: 850px;
            margin: auto;
        }

        .stats-summary {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border-left: 5px solid #22d3ee;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
        }

        .concept-card {
            background: #0f172a;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85em;
            text-align: center;
        }

        .concept-card b { color: #22d3ee; display: block; margin-bottom: 5px; }

        .questao {
            background: #1e293b;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border-bottom: 3px solid #22d3ee;
        }

        label {
            display: block;
            background: #334155;
            padding: 12px;
            margin: 8px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        label:hover {
            background: #164e63; /* Cyan-900 */
        }

        button {
            background: #22d3ee;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover {
            background: #67e8f9;
            transform: scale(1.02);
        }

        .resolucao-box {
            display: none;
            margin-top: 15px;
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px dashed #22d3ee;
            line-height: 1.6;
        }

        .voltar {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #94a3b8;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <h1>Matemática - Análise de Dados 📊</h1>

    <div id="container-questoes">
        <div class="stats-summary">
            <div class="concept-card">
                <b>Média (x̄)</b>
                Soma de todos os valores dividida pela quantidade.
            </div>
            <div class="concept-card">
                <b>Mediana (Md)</b>
                Valor central do rol (lista em ordem).
            </div>
            <div class="concept-card">
                <b>Moda (Mo)</b>
                Valor que ocorre com maior frequência.
            </div>
        </div>

        <p style="text-align:center; color:#64748b;">Processando amostras de dados...</p>
    </div>

    <a class="voltar" href="matematica.html">⬅ Voltar</a>

    <script>
    function carregarQuestoes() {
        const container = document.getElementById("container-questoes");
        const banco = JSON.parse(localStorage.getItem("bancoQuestoes")) || [];
        
        // Filtra por materia: matematica e assunto: estatistica
        const filtradas = banco.filter(q => q.materia === "matematica" && q.assunto === "estatistica");

        const summaryHtml = document.querySelector(".stats-summary").outerHTML;
        
        if (filtradas.length === 0) {
            container.innerHTML = summaryHtml + "<p style='text-align:center; color:#94a3b8;'>Banco de dados vazio. Adicione questões de estatística!</p>";
            return;
        }

        container.innerHTML = summaryHtml; 

        filtradas.forEach((q, index) => {
            const div = document.createElement("div");
            div.className = "questao";

            div.innerHTML = `
                <p><b>${index + 1}.</b> ${q.pergunta}</p>
                <label><input type="radio" name="q${q.id}" value="a"> A) ${q.a}</label>
                <label><input type="radio" name="q${q.id}" value="b"> B) ${q.b}</label>
                <label><input type="radio" name="q${q.id}" value="c"> C) ${q.c}</label>
                <label><input type="radio" name="q${q.id}" value="d"> D) ${q.d}</label>
                
                <button onclick="verificar('${q.id}', '${q.correta}')">Calcular Resultado</button>
                <p id="feedback-${q.id}" style="margin-top:10px; font-weight:bold;"></p>
                
                <div id="res-${q.id}" class="resolucao-box">
                    <b style="color:#22d3ee;">Memória de Cálculo:</b><br>
                    ${q.resolucao || "Verifique os conceitos de média, moda ou mediana aplicados aqui."}
                </div>
            `;
            container.appendChild(div);
        });
    }

    function verificar(id, correta) {
        const selecionada = document.querySelector(`input[name="q${id}"]:checked`);
        const feedback = document.getElementById(`feedback-${id}`);
        const resBox = document.getElementById(`res-${id}`);

        if (!selecionada) {
            alert("Selecione um dado da amostra!");
            return;
        }

        const acertou = selecionada.value === correta;
        resBox.style.display = "block";

        if (acertou) {
            feedback.innerText = "✅ Correto! Tendência central identificada.";
            feedback.style.color = "#22d3ee";
        } else {
            feedback.innerText = `❌ Incorreto. O valor esperado era (${correta.toUpperCase()})`;
            feedback.style.color = "#f87171";
        }

        // Integração Mundo CAVEST
        let logado = localStorage.getItem("logado");
        if(logado){
            let usuario = JSON.parse(localStorage.getItem(logado));
            if(!usuario.questoesResolvidas) usuario.questoesResolvidas = [];
            
            if(!usuario.questoesResolvidas.includes(id)){
                usuario.respondidas = (usuario.respondidas || 0) + 1;
                if(acertou) usuario.acertos = (usuario.acertos || 0) + 1;
                usuario.questoesResolvidas.push(id);
                localStorage.setItem(logado, JSON.stringify(usuario));
            }
        }
    }

    window.onload = carregarQuestoes;
    </script>

</body>
</html>
